<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkBoard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================================================
   WORKBOARD — Trello-faithful redesign
   Session 1 patches: XSS fix, topbar layout fix, inline card create
   ============================================================ */

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#ff6b35;
  --accent-dark:#e85d26;
  --ink:#172b4d;
  --ink-soft:#42526e;
  --muted:#5e6c84;
  --muted-soft:#8993a4;
  --line:#dfe1e6;
  --line-soft:#ebecf0;
  --bg-app:#f4f5f7;
  --bg-col:#ebecf0;
  --bg-card:#ffffff;
  --bg-card-hover:#fafbfc;
  --shadow-card:0 1px 0 rgba(9,30,66,.25);
  --shadow-card-hover:0 4px 8px -2px rgba(9,30,66,.25), 0 0 0 1px rgba(9,30,66,.08);
  --shadow-pop:0 8px 16px -4px rgba(9,30,66,.25), 0 0 1px rgba(9,30,66,.31);
  --shadow-modal:0 20px 32px -8px rgba(9,30,66,.25), 0 0 1px rgba(9,30,66,.31);
  --board-bg:linear-gradient(135deg,#0079bf 0%,#5067c5 50%,#7d51b3 100%);
  --label-green:#61bd4f;
  --label-yellow:#f2d600;
  --label-orange:#ff9f1a;
  --label-red:#eb5a46;
  --label-purple:#c377e0;
  --label-blue:#0079bf;
  --label-sky:#00c2e0;
  --label-lime:#51e898;
  --label-pink:#ff78cb;
  --label-black:#344563;
}

html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
  background:var(--bg-app);
  color:var(--ink);
  font-size:14px;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* ============================================================
   AUTH
   ============================================================ */
#auth-screen{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:var(--board-bg);
  position:relative;
  padding:20px;
}
#auth-screen::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 20% 30%,rgba(255,255,255,.12),transparent 50%),
             radial-gradient(circle at 80% 70%,rgba(255,255,255,.08),transparent 50%);
  pointer-events:none;
}
#app{display:none}

.auth-box{
  position:relative;
  background:#fff;
  border-radius:12px;
  padding:36px 40px 32px;
  width:400px;
  box-shadow:0 18px 40px -12px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.08);
}

.brand{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.brand-icon{
  width:38px;height:38px;
  background:linear-gradient(135deg,var(--accent),#ff8c5a);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:17px;color:#fff;
  box-shadow:0 2px 6px rgba(255,107,53,.4);
}
.brand-name{font-size:21px;font-weight:800;color:var(--ink);letter-spacing:-0.01em}

h2{font-size:22px;font-weight:700;color:var(--ink);margin-bottom:4px;letter-spacing:-0.01em}
.sub{color:var(--muted);font-size:13px;margin-bottom:24px}

.fg{margin-bottom:14px}
.fg label{
  display:block;
  font-size:11px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;
  color:var(--muted);margin-bottom:6px;
}
.fg input,.fg select,.fg textarea{
  width:100%;padding:10px 13px;
  background:#fafbfc;
  border:2px solid #fafbfc;
  border-radius:6px;
  font-family:inherit;font-size:14px;
  color:var(--ink);
  outline:none;
  transition:background .15s,border-color .15s;
}
.fg input:hover,.fg select:hover,.fg textarea:hover{background:#ebecf0;border-color:#ebecf0}
.fg input:focus,.fg select:focus,.fg textarea:focus{background:#fff;border-color:var(--accent)}
.fg textarea{resize:vertical;min-height:80px;line-height:1.5}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:8px 14px;
  border-radius:6px;border:none;
  font-family:inherit;font-size:13px;font-weight:600;
  cursor:pointer;
  transition:background .14s,box-shadow .14s,transform .05s;
  white-space:nowrap;
}
.btn:active{transform:translateY(1px)}
.btn-acc{background:var(--accent);color:#fff;box-shadow:0 1px 0 rgba(9,30,66,.15)}
.btn-acc:hover{background:var(--accent-dark)}
.btn-acc:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:rgba(9,30,66,.04);color:var(--ink-soft)}
.btn-ghost:hover{background:rgba(9,30,66,.08);color:var(--ink)}
.btn-red{background:#fef2f2;color:#bf2600;border:1px solid transparent}
.btn-red:hover{background:#ffebe6}
.btn-full{width:100%;padding:11px;font-size:14px;font-weight:700}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-xs{padding:4px 10px;font-size:11px;font-weight:700}

.auth-err{
  background:#ffebe6;border:1px solid #ffbdad;
  color:#bf2600;
  padding:10px 14px;border-radius:6px;
  font-size:13px;margin-top:14px;display:none;
}

/* ============================================================
   TOPBAR — fixed-position so content can flow under safely
   ============================================================ */
.topbar{
  background:rgba(0,0,0,.3);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  padding:0 20px;height:48px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:300;
  border-bottom:1px solid rgba(255,255,255,.08);
}
body.not-board .topbar{background:#1d2125;border-bottom-color:rgba(255,255,255,.06)}

.tb-left{display:flex;align-items:center;gap:18px}
.tb-brand{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800;color:#fff;letter-spacing:-0.01em}
.tb-icon{
  width:28px;height:28px;
  background:linear-gradient(135deg,var(--accent),#ff8c5a);
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:#fff;
}

.tb-nav{display:flex;gap:2px}
.nav-btn{
  padding:6px 12px;border-radius:4px;
  font-size:13px;font-weight:600;
  color:rgba(255,255,255,.7);cursor:pointer;
  border:none;background:transparent;
  font-family:inherit;
  transition:background .14s,color .14s;
}
.nav-btn:hover{color:#fff;background:rgba(255,255,255,.16)}
.nav-btn.active{color:#fff;background:rgba(255,255,255,.24)}

.tb-right{display:flex;align-items:center;gap:10px}
.user-chip{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.16);
  border-radius:20px;
  padding:3px 12px 3px 3px;
}
.ava{
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#fff;
  flex-shrink:0;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.15);
}
.ava-md{width:36px;height:36px;border-radius:50%;font-size:13px}
.uname{font-size:13px;font-weight:600;color:#fff}
.role-tag{
  font-size:9px;font-weight:800;
  letter-spacing:.08em;text-transform:uppercase;
  padding:2px 7px;border-radius:10px;
}
.rt-ceo{background:rgba(255,159,26,.25);color:#ffd494}
.rt-manager{background:rgba(97,189,79,.25);color:#a3e890}
.rt-member{background:rgba(255,255,255,.16);color:rgba(255,255,255,.85)}

.signout-btn{
  background:rgba(255,255,255,.08);
  border:none;
  color:rgba(255,255,255,.85);
  padding:6px 12px;border-radius:4px;
  font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;
  transition:background .14s;
}
.signout-btn:hover{background:rgba(255,255,255,.18);color:#fff}

/* ============================================================
   NOTIFICATION BELL + PANEL (Session 5)
   ============================================================ */
.bell-btn{
  position:relative;
  width:34px;height:34px;
  background:rgba(255,255,255,.08);
  border:none;border-radius:50%;
  color:rgba(255,255,255,.85);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .14s,color .14s;
}
.bell-btn:hover{background:rgba(255,255,255,.18);color:#fff}
.bell-count{
  position:absolute;top:-2px;right:-2px;
  min-width:16px;height:16px;
  padding:0 4px;
  background:#eb5a46;color:#fff;
  border-radius:8px;
  font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 2px #1d2125;
}
body:not(.not-board) .bell-count{box-shadow:0 0 0 2px rgba(0,0,0,.5)}

.notif-panel{
  position:fixed;
  top:54px;right:20px;
  width:340px;
  max-height:500px;
  background:#fff;
  border-radius:10px;
  box-shadow:0 12px 32px rgba(9,30,66,.25),0 0 0 1px rgba(9,30,66,.08);
  z-index:400;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.notif-head{
  padding:12px 16px;
  border-bottom:1px solid var(--line-soft);
  display:flex;align-items:center;justify-content:space-between;
  font-size:13px;font-weight:700;color:var(--ink);
}
.notif-list{flex:1;overflow-y:auto}
.notif-empty{
  padding:32px 20px;
  text-align:center;
  font-size:13px;color:var(--muted-soft);
}
.notif-item{
  padding:12px 16px;
  border-bottom:1px solid var(--line-soft);
  cursor:pointer;
  transition:background .14s;
}
.notif-item:last-child{border-bottom:none}
.notif-item:hover{background:#fafbfc}
.notif-item-from{
  font-size:13px;color:var(--ink);
  margin-bottom:3px;
}
.notif-item-from b{font-weight:700}
.notif-item-task{
  font-size:12px;color:var(--accent);
  font-weight:600;
  margin-bottom:3px;
}
.notif-item-snippet{
  font-size:12px;color:var(--muted);
  line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.notif-item-time{
  font-size:11px;color:var(--muted-soft);
  margin-top:4px;
}

/* ============================================================
   ACTIVITY LOG (Session 5)
   ============================================================ */
.activity-section{
  border-top:1px solid var(--line-soft);
  margin-top:18px;padding-top:18px;
}
.activity-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.activity-list{
  display:flex;flex-direction:column;gap:6px;
}
.activity-item{
  display:flex;gap:8px;align-items:flex-start;
  padding:6px 4px;
  font-size:12px;color:var(--ink-soft);
  line-height:1.5;
}
.activity-item .ava{width:20px;height:20px;font-size:8px;flex-shrink:0;margin-top:1px}
.activity-text b{font-weight:700;color:var(--ink)}
.activity-text .activity-action{color:var(--muted)}
.activity-time{
  font-size:11px;color:var(--muted-soft);
  margin-left:6px;
}

/* ============================================================
   @MENTION CHIPS + AUTOCOMPLETE (Session 5)
   ============================================================ */
.mention-chip{
  display:inline-block;
  background:rgba(0,121,191,.12);
  color:#055a8c;
  font-weight:600;
  padding:1px 6px;
  border-radius:4px;
  font-size:0.95em;
}
.mention-popup{
  position:absolute;
  background:#fff;
  border-radius:8px;
  box-shadow:0 8px 20px rgba(9,30,66,.2),0 0 0 1px rgba(9,30,66,.08);
  z-index:9000;
  min-width:220px;max-width:280px;
  max-height:240px;
  overflow-y:auto;
  display:none;
}
.mention-popup.open{display:block}
.mention-popup-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;
  cursor:pointer;
  transition:background .14s;
}
.mention-popup-row:hover,.mention-popup-row.active{background:rgba(0,121,191,.08)}
.mention-popup-name{font-size:13px;font-weight:600;color:var(--ink)}
.mention-popup-role{font-size:11px;color:var(--muted-soft)}

/* ============================================================
   PAGES
   ============================================================ */
.page{display:none}
.page.active{display:block}

#pg-board{padding:0;background:var(--board-bg);min-height:calc(100vh - 48px)}
#pg-overview,#pg-people{padding:28px 32px}

/* FIX: board-head needs explicit top padding so titles aren't clipped
   when the sticky topbar overlaps on first render. */
.board-head{
  padding:24px 28px 16px;
  display:flex;align-items:flex-start;justify-content:space-between;gap:16px;
  flex-wrap:wrap;
}
.board-head .page-title{color:#fff;font-size:22px;font-weight:700;letter-spacing:-0.01em;text-shadow:0 1px 2px rgba(0,0,0,.2)}
.board-head .page-sub{color:rgba(255,255,255,.85);font-size:13px;margin-top:3px;text-shadow:0 1px 2px rgba(0,0,0,.15)}
.board-head .btn-ghost{background:rgba(255,255,255,.24);color:#fff}
.board-head .btn-ghost:hover{background:rgba(255,255,255,.32)}
.board-head .btn-ghost option{color:var(--ink)}
.board-head .btn-acc{box-shadow:0 1px 0 rgba(9,30,66,.25),0 2px 6px rgba(0,0,0,.15)}

.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:16px}
.page-title{font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-0.01em}
.page-sub{color:var(--muted);font-size:13px;margin-top:3px}

/* ============================================================
   KANBAN
   ============================================================ */
.kanban-wrap{padding:0 28px 28px;overflow-y:auto}

.person-lane{
  margin-bottom:22px;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  border-radius:12px;
  padding:16px 18px 18px;
  box-shadow:0 4px 12px rgba(0,0,0,.12),0 0 0 1px rgba(9,30,66,.08);
}
.person-head{
  display:flex;align-items:center;gap:12px;
  margin-bottom:14px;
  padding-bottom:12px;
  border-bottom:1px solid var(--line-soft);
}
.person-name{font-size:15px;font-weight:700;color:var(--ink);letter-spacing:-0.01em}
.person-meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.person-role-pill{
  font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.05em;
  padding:2px 8px;border-radius:10px;
}

.swimlane-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}

.k-col{
  background:var(--bg-col);
  border-radius:12px;
  display:flex;flex-direction:column;
  max-height:600px;
  overflow:hidden;
  box-shadow:0 1px 0 rgba(9,30,66,.12);
}
.k-head{
  padding:10px 14px 6px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  flex-shrink:0;
}
.k-title-row{display:flex;align-items:center;gap:8px;min-width:0}
.k-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 2px rgba(255,255,255,.6)}
.k-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft)}
.k-count{
  background:rgba(9,30,66,.08);
  border-radius:10px;
  padding:1px 8px;
  font-size:11px;font-weight:700;
  color:var(--muted);
}
.k-add{
  width:24px;height:24px;border-radius:4px;
  background:transparent;border:none;
  color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;line-height:1;
  transition:background .14s,color .14s;
}
.k-add:hover{background:rgba(9,30,66,.08);color:var(--ink)}

.k-cards{
  padding:4px 8px 8px;
  overflow-y:auto;flex:1;
  display:flex;flex-direction:column;gap:8px;
  min-height:80px;
  transition:background .15s;
}
.k-cards.drag-over{background:rgba(255,107,53,.15)}

/* Drop indicator: thin colored line between cards while dragging.
   Shows exactly where the dragged card will land. */
.drop-indicator{
  height:3px;
  background:var(--accent);
  border-radius:2px;
  margin:2px 4px;
  pointer-events:none;
  box-shadow:0 0 0 2px rgba(255,107,53,.2);
}

.empty-col{
  text-align:center;
  font-size:12px;color:var(--muted-soft);
  padding:14px 0;
  border:2px dashed rgba(9,30,66,.1);
  border-radius:8px;
  margin:4px 2px;
  font-weight:500;
}

.add-card-btn{
  display:flex;align-items:center;gap:6px;
  padding:8px 10px;
  background:transparent;border:none;
  color:var(--muted);
  font-family:inherit;font-size:13px;font-weight:500;
  cursor:pointer;border-radius:6px;
  text-align:left;
  margin:0 2px;
  transition:background .14s,color .14s;
  width:calc(100% - 4px);
}
.add-card-btn:hover{background:rgba(9,30,66,.08);color:var(--ink)}

/* ============================================================
   INLINE CARD COMPOSER (NEW — Session 1)
   ============================================================ */
.inline-composer{
  margin:0 2px;
  display:flex;flex-direction:column;gap:6px;
}
.inline-composer textarea{
  width:100%;
  padding:10px 12px;
  background:#fff;
  border:none;
  border-radius:8px;
  font-family:inherit;
  font-size:14px;
  color:var(--ink);
  resize:none;
  outline:none;
  box-shadow:0 1px 0 rgba(9,30,66,.25);
  min-height:60px;
  line-height:1.4;
}
.inline-composer textarea:focus{box-shadow:0 0 0 2px var(--accent)}
.inline-composer-actions{display:flex;align-items:center;gap:6px}
.composer-cancel{
  width:30px;height:30px;border-radius:6px;
  background:transparent;border:none;
  color:var(--muted);cursor:pointer;
  font-size:18px;line-height:1;
  display:flex;align-items:center;justify-content:center;
  transition:background .14s,color .14s;
}
.composer-cancel:hover{background:rgba(9,30,66,.08);color:var(--ink)}

/* ============================================================
   TASK CARD
   ============================================================ */
.t-card{
  background:var(--bg-card);
  border-radius:8px;
  padding:0;
  cursor:pointer;
  user-select:none;
  position:relative;
  box-shadow:var(--shadow-card);
  overflow:hidden;
  transition:background .12s,box-shadow .12s,transform .08s;
}
.t-card:hover{
  background:var(--bg-card-hover);
  box-shadow:var(--shadow-card-hover);
}
.t-card.dragging{opacity:.55;transform:rotate(3deg) scale(.98);box-shadow:var(--shadow-pop)}

.t-cover{height:8px;background:var(--label-blue)}
.t-card.pri-border-high .t-cover{background:linear-gradient(90deg,var(--label-red) 0%,#ff7452 100%)}
.t-card.pri-border-medium .t-cover{background:linear-gradient(90deg,var(--label-orange) 0%,#ffbf66 100%)}
.t-card.pri-border-low .t-cover{background:linear-gradient(90deg,var(--label-green) 0%,#8fd87a 100%)}

.t-body{padding:8px 12px 10px}

.t-labels{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.t-label{
  height:16px;
  min-width:40px;max-width:200px;
  border-radius:4px;
  flex-shrink:0;
  display:inline-flex;align-items:center;
  padding:0 8px;
  font-size:11px;font-weight:700;
  color:rgba(0,0,0,.78);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1;
}
/* Compact bars on board cards: hide the text, shrink height */
.t-card .t-label{
  height:8px;
  font-size:0;
  padding:0;
  min-width:40px;max-width:56px;
}
.t-label.l-green{background:var(--label-green)}
.t-label.l-yellow{background:var(--label-yellow)}
.t-label.l-orange{background:var(--label-orange)}
.t-label.l-red{background:var(--label-red)}
.t-label.l-purple{background:var(--label-purple)}
.t-label.l-blue{background:var(--label-blue)}

/* Label picker grid in detail modal */
.label-picker{display:flex;flex-direction:column;gap:6px}
.label-picker-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
  transition:background .14s;
  background:#fff;
  box-shadow:0 1px 2px rgba(9,30,66,.06);
}
.label-picker-row:hover{background:#fafbfc}
.label-picker-bar{
  flex:1;
  height:30px;border-radius:4px;
  display:flex;align-items:center;
  padding:0 12px;
  font-size:13px;font-weight:600;
  color:rgba(0,0,0,.78);
}
.label-picker-check{
  width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink);
  font-size:14px;font-weight:800;
}

.t-title-text{
  font-size:14px;font-weight:500;
  line-height:1.4;
  color:var(--ink);
  margin-bottom:8px;
  word-wrap:break-word;
  overflow-wrap:break-word;
}

.t-badges{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:6px}
.t-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:12px;font-weight:500;
  color:var(--muted);
  padding:2px 4px;
  border-radius:4px;
}
.t-badge svg{width:13px;height:13px;flex-shrink:0}
.t-badge.due-today{background:#fff3bf;color:#7a5c00}
.t-badge.due-late{background:#ffd2cc;color:#bf2600}
.t-badge.due-late svg{color:#bf2600}
.t-badge.checklist-complete{background:#d3f1a7;color:#2e6b1a}

/* ============================================================
   CHECKLIST in detail modal (Session 3)
   ============================================================ */
.checklist-section{
  border-top:1px solid var(--line-soft);
  margin-top:18px;padding-top:18px;
}
.checklist-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;gap:10px;
}
.checklist-title{
  font-size:12px;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;
  color:var(--muted);
}
.checklist-progress-wrap{
  display:flex;align-items:center;gap:10px;
  margin-bottom:12px;
}
.checklist-progress-num{
  font-size:11px;font-weight:700;color:var(--muted);
  min-width:30px;
}
.checklist-progress-bar{
  flex:1;height:8px;background:var(--line-soft);
  border-radius:4px;overflow:hidden;
}
.checklist-progress-fill{
  height:100%;background:var(--label-blue);
  transition:width .25s ease, background .25s ease;
}
.checklist-progress-fill.complete{background:var(--label-green)}

.checklist-items{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.checklist-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:6px 8px;
  border-radius:6px;
  transition:background .14s;
}
.checklist-item:hover{background:rgba(9,30,66,.04)}
.checklist-checkbox{
  width:18px;height:18px;
  flex-shrink:0;margin-top:1px;
  cursor:pointer;
  accent-color:var(--label-green);
}
.checklist-text{
  flex:1;font-size:13px;color:var(--ink);line-height:1.5;
  word-wrap:break-word;
  cursor:pointer;
}
.checklist-text.done{
  color:var(--muted-soft);
  text-decoration:line-through;
}
.checklist-delete{
  width:24px;height:24px;
  background:transparent;border:none;
  color:var(--muted-soft);cursor:pointer;
  font-size:14px;line-height:1;
  border-radius:4px;
  opacity:0;transition:opacity .14s,color .14s,background .14s;
}
.checklist-item:hover .checklist-delete{opacity:1}
.checklist-delete:hover{color:#bf2600;background:rgba(191,38,0,.1)}

.checklist-add-row{display:flex;gap:8px;align-items:center;margin-top:6px}
.checklist-add-input{
  flex:1;
  padding:8px 12px;
  background:#fff;
  border:2px solid #fff;
  border-radius:6px;
  font-family:inherit;font-size:13px;
  color:var(--ink);
  outline:none;
  box-shadow:0 1px 2px rgba(9,30,66,.06);
  transition:border-color .14s;
}
.checklist-add-input:focus{border-color:var(--accent)}

.checklist-readonly-note{
  font-size:11px;color:var(--muted-soft);
  margin-top:6px;font-style:italic;
}

.t-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:4px}
.pri{
  font-size:10px;font-weight:700;
  text-transform:uppercase;
  padding:2px 7px;border-radius:4px;
  letter-spacing:.04em;
}
.pri-high{background:#ffebe6;color:#bf2600}
.pri-medium{background:#fff7d6;color:#7a5c00}
.pri-low{background:#e3fcef;color:#006644}

.t-ass{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.t-ass .ava{width:24px;height:24px;font-size:9px;box-shadow:0 0 0 2px #fff}

/* "updated Xh ago" subtle footer line on cards (Session 4) */
.t-updated{
  font-size:10px;
  color:var(--muted-soft);
  margin-top:6px;
  text-align:right;
  font-weight:500;
}

.t-due{
  font-size:11px;color:var(--muted);
  background:var(--line-soft);
  padding:3px 8px;border-radius:4px;
  white-space:nowrap;font-weight:500;
}
.t-due.late{background:#ffd2cc;color:#bf2600}

/* ============================================================
   STATS, OVERVIEW, PEOPLE — unchanged
   ============================================================ */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
.stat{
  background:#fff;border-radius:10px;
  padding:18px 20px;
  border-top:3px solid var(--line);
  box-shadow:0 1px 2px rgba(9,30,66,.08),0 0 0 1px rgba(9,30,66,.04);
}
.stat-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.stat-val{font-size:28px;font-weight:800;color:var(--ink);letter-spacing:-0.02em}
.stat-sub{font-size:12px;color:var(--muted-soft);margin-top:3px}

.ov-panel{background:#fff;border-radius:10px;box-shadow:0 1px 2px rgba(9,30,66,.08),0 0 0 1px rgba(9,30,66,.04)}
.ov-panel-head{padding:14px 20px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ov-panel-head-title{font-size:14px;font-weight:700;color:var(--ink)}
.ov-panel-body{padding:6px 20px 16px}

/* Org Overview filter controls (Session 4) */
.ov-search-input{
  padding:6px 12px;
  background:#f4f5f7;
  border:1.5px solid #f4f5f7;
  border-radius:6px;
  font-family:inherit;font-size:12px;
  color:var(--ink);
  outline:none;
  width:200px;
  transition:border-color .14s,background .14s;
}
.ov-search-input:focus{border-color:var(--accent);background:#fff}
.ov-search-input::placeholder{color:var(--muted-soft)}
.ov-toggle{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;font-weight:600;color:var(--ink-soft);
  cursor:pointer;
  padding:6px 10px;border-radius:6px;
  background:rgba(9,30,66,.04);
}
.ov-toggle:hover{background:rgba(9,30,66,.08)}
.ov-toggle input{cursor:pointer;accent-color:var(--accent)}

.ov-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 0;
  border-bottom:1px solid var(--line-soft);
  cursor:pointer;
  transition:opacity .14s;
}
.ov-row:last-child{border-bottom:none}
.ov-row:hover{opacity:.7}

.ppl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.p-card{
  background:#fff;border-radius:10px;
  padding:18px 20px;
  display:flex;align-items:center;gap:14px;
  box-shadow:0 1px 2px rgba(9,30,66,.08),0 0 0 1px rgba(9,30,66,.04);
  transition:box-shadow .14s,transform .08s;
}
.p-card:hover{
  box-shadow:0 4px 12px rgba(9,30,66,.12),0 0 0 1px rgba(9,30,66,.08);
  transform:translateY(-1px);
}
.p-info{flex:1;min-width:0}
.p-name{font-size:15px;font-weight:700;color:var(--ink)}
.p-email{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.p-meta{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
.p-role{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:10px}
.pr-ceo{background:#fff7d6;color:#7a5c00}
.pr-manager{background:#e3fcef;color:#006644}
.pr-member{background:var(--line-soft);color:var(--muted)}
.p-actions{display:flex;gap:6px;flex-shrink:0}

/* ============================================================
   MODAL
   ============================================================ */
.overlay{
  position:fixed;inset:0;
  background:rgba(9,30,66,.54);
  z-index:500;
  display:none;align-items:flex-start;justify-content:center;
  padding:48px 20px 20px;
  overflow-y:auto;
}
.overlay.open{display:flex}

.modal{
  background:#f4f5f7;
  border-radius:10px;
  width:100%;max-width:520px;
  box-shadow:var(--shadow-modal);
  animation:mIn .18s ease;
  overflow:hidden;
}
.modal-wide{max-width:680px}

@keyframes mIn{
  from{opacity:0;transform:translateY(-8px) scale(.98)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

.m-head{
  padding:18px 20px 14px;
  background:#fff;
  border-bottom:1px solid var(--line-soft);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.m-title{font-size:16px;font-weight:700;color:var(--ink);min-width:0}
.m-close{
  width:30px;height:30px;border-radius:6px;
  background:transparent;border:none;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--muted);
  transition:background .14s,color .14s;
}
.m-close:hover{background:rgba(9,30,66,.08);color:var(--ink)}

.m-body{padding:20px;background:#f4f5f7}
.m-foot{
  padding:14px 20px;
  background:#fff;
  border-top:1px solid var(--line-soft);
  display:flex;gap:8px;justify-content:flex-end;
}

.m-body .fg input,.m-body .fg select,.m-body .fg textarea{background:#fff;border-color:#fff}
.m-body .fg input:hover,.m-body .fg select:hover,.m-body .fg textarea:hover{background:#fafbfc;border-color:#fafbfc}
.m-body .fg input:focus,.m-body .fg select:focus,.m-body .fg textarea:focus{background:#fff;border-color:var(--accent)}

/* ============================================================
   DETAIL MODAL
   ============================================================ */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
.dl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px}
.dv{font-size:14px;font-weight:600;color:var(--ink)}

#d-desc>div{
  background:#fff;
  border-radius:8px;
  padding:14px 16px;
  font-size:13px;color:var(--ink-soft);
  line-height:1.6;
  margin-bottom:8px;
  box-shadow:0 1px 2px rgba(9,30,66,.06);
  white-space:pre-wrap;
  word-wrap:break-word;
}

/* ============================================================
   COMMENTS
   ============================================================ */
.comments-wrap{border-top:1px solid var(--line-soft);margin-top:18px;padding-top:18px}
.c-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:14px}
.c-list{display:flex;flex-direction:column;gap:12px;margin-bottom:14px;max-height:240px;overflow-y:auto}
.c-item{display:flex;gap:10px}
.c-body{
  flex:1;
  background:#fff;
  border-radius:8px;
  padding:10px 14px;
  box-shadow:0 1px 2px rgba(9,30,66,.06);
}
.c-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.c-author{font-size:13px;font-weight:700;color:var(--ink)}
.c-time{font-size:11px;color:var(--muted-soft)}
.c-text{font-size:13px;color:var(--ink-soft);line-height:1.5;word-wrap:break-word;white-space:pre-wrap}

.c-input-row{display:flex;gap:8px;align-items:flex-end}
.cinput{
  flex:1;
  padding:10px 14px;
  background:#fff;
  border:2px solid #fff;
  border-radius:8px;
  font-family:inherit;font-size:13px;
  color:var(--ink);
  outline:none;resize:none;
  min-height:42px;max-height:120px;
  box-shadow:0 1px 2px rgba(9,30,66,.06);
  transition:border-color .14s;
}
.cinput:focus{border-color:var(--accent)}

/* ============================================================
   EMPTY / TOAST
   ============================================================ */
.empty{text-align:center;padding:48px 20px;color:var(--muted-soft)}
.empty h3{font-size:16px;font-weight:700;color:var(--muted);margin-bottom:6px}
.empty p{font-size:13px}

.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--ink);color:#fff;
  padding:11px 18px;border-radius:8px;
  font-size:13px;font-weight:600;
  box-shadow:0 8px 24px rgba(0,0,0,.25);
  z-index:9999;
  transform:translateY(60px);opacity:0;
  transition:transform .28s,opacity .28s;
}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:#006644}
.toast.err{background:#bf2600}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(9,30,66,.16);border-radius:4px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:rgba(9,30,66,.28);background-clip:padding-box;border:2px solid transparent}
#pg-board ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.32);background-clip:padding-box;border:2px solid transparent}
#pg-board ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.5);background-clip:padding-box;border:2px solid transparent}

.drag-handle{display:none}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div class="brand"><div class="brand-icon">W</div><span class="brand-name">WorkBoard</span></div>
    <h2>Welcome back</h2>
    <p class="sub">Sign in to your workspace</p>
    <div class="fg"><label>Email</label><input type="email" id="inp-email" placeholder="you@apporio.com"></div>
    <div class="fg"><label>Password</label><input type="password" id="inp-pass" placeholder="••••••••"></div>
    <button class="btn btn-acc btn-full" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<div id="toast"></div>
<div class="mention-popup" id="mention-popup"></div>

<div id="app">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-brand"><div class="tb-icon">W</div>WorkBoard</div>
      <nav class="tb-nav" id="tb-nav"></nav>
    </div>
    <div class="tb-right">
      <button class="bell-btn" id="bell-btn" onclick="toggleNotifPanel(event)" title="Notifications">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span class="bell-count" id="bell-count" style="display:none">0</span>
      </button>
      <div class="notif-panel" id="notif-panel" style="display:none">
        <div class="notif-head">
          <span>Notifications</span>
          <button class="btn btn-ghost btn-xs" id="notif-mark-all" onclick="markAllMentionsRead()" style="display:none">Mark all read</button>
        </div>
        <div class="notif-list" id="notif-list"></div>
      </div>
      <div class="user-chip"><div class="ava" id="top-ava"></div><span class="uname" id="top-name"></span><span class="role-tag" id="top-role"></span></div>
      <button class="signout-btn" onclick="doLogout()">Sign out</button>
    </div>
  </div>

  <div class="page" id="pg-board">
    <div class="board-head">
      <div><div class="page-title" id="board-title">My Board</div><div class="page-sub" id="board-sub">Your personal task board</div></div>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="board-filter" class="btn btn-ghost btn-sm" style="cursor:pointer" onchange="renderBoard()"><option value="mine">My Tasks</option></select>
        <button class="btn btn-acc btn-sm" onclick="openTaskModal()">+ Add Task</button>
      </div>
    </div>
    <div class="kanban-wrap" id="kanban-wrap"></div>
  </div>

  <div class="page" id="pg-overview">
    <div class="page-head">
      <div><div class="page-title">Org Overview</div><div class="page-sub">All tasks across the organisation</div></div>
      <button class="btn btn-acc btn-sm" onclick="openTaskModal()">+ New Task</button>
    </div>
    <div class="stats" id="stats"></div>
    <div class="ov-panel">
      <div class="ov-panel-head">
        <span class="ov-panel-head-title">All Tasks <span id="ov-count" style="color:var(--muted-soft);font-weight:500"></span></span>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <input type="search" id="ov-search" class="ov-search-input" placeholder="Search by title..." oninput="renderOvList()">
          <select id="ov-person" class="btn btn-ghost btn-sm" style="cursor:pointer" onchange="renderOvList()"><option value="">Everyone</option></select>
          <select id="ov-status" class="btn btn-ghost btn-sm" style="cursor:pointer" onchange="renderOvList()"><option value="">All Status</option><option value="todo">To Do</option><option value="in_progress">In Progress</option><option value="done">Done</option></select>
          <select id="ov-priority" class="btn btn-ghost btn-sm" style="cursor:pointer" onchange="renderOvList()"><option value="">Any Priority</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select>
          <select id="ov-label" class="btn btn-ghost btn-sm" style="cursor:pointer" onchange="renderOvList()"><option value="">Any Label</option></select>
          <label class="ov-toggle"><input type="checkbox" id="ov-overdue" onchange="renderOvList()"> Overdue only</label>
          <button id="ov-clear" class="btn btn-ghost btn-xs" onclick="clearOvFilters()" style="display:none">Clear</button>
        </div>
      </div>
      <div class="ov-panel-body" id="ov-list"></div>
    </div>
  </div>

  <div class="page" id="pg-people">
    <div class="page-head">
      <div><div class="page-title">People</div><div class="page-sub" id="ppl-sub"></div></div>
      <button class="btn btn-acc btn-sm" id="add-ppl-btn" onclick="openPersonModal()" style="display:none">+ Add Person</button>
    </div>
    <div class="ppl-grid" id="ppl-grid"></div>
  </div>
</div>

<!-- Task Modal -->
<div class="overlay" id="m-task">
  <div class="modal">
    <div class="m-head"><div class="m-title" id="m-task-title">New Task</div><button class="m-close" onclick="closeModal('m-task')">&#x2715;</button></div>
    <div class="m-body">
      <div class="fg"><label>Title</label><input type="text" id="t-title" maxlength="200" placeholder="What needs to be done?"></div>
      <div class="fg"><label>Description</label><textarea id="t-desc" maxlength="2000" placeholder="Add details..."></textarea></div>
      <div class="form-row">
        <div class="fg"><label>Assign To</label><select id="t-assignee"></select></div>
        <div class="fg"><label>Priority</label><select id="t-priority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select></div>
      </div>
      <div class="form-row">
        <div class="fg"><label>Status</label><select id="t-status"><option value="todo">To Do</option><option value="in_progress">In Progress</option><option value="done">Done</option></select></div>
        <div class="fg"><label>Due Date</label><input type="date" id="t-due"></div>
      </div>
    </div>
    <div class="m-foot"><button class="btn btn-ghost btn-sm" onclick="closeModal('m-task')">Cancel</button><button class="btn btn-acc btn-sm" onclick="saveTask()">Save Task</button></div>
  </div>
</div>

<!-- Detail Modal -->
<div class="overlay" id="m-detail">
  <div class="modal modal-wide">
    <div class="m-head">
      <div class="m-title" id="d-title" style="max-width:78%"></div>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn btn-sm btn-ghost" id="d-edit-btn" onclick="editFromDetail()">Edit</button>
        <button class="btn btn-sm btn-red" id="d-del-btn" onclick="deleteTask()">Delete</button>
        <button class="m-close" onclick="closeModal('m-detail')">&#x2715;</button>
      </div>
    </div>
    <div class="m-body">
      <div class="detail-grid" id="d-meta"></div>
      <div id="d-desc"></div>

      <!-- Labels section (Session 3) -->
      <div id="d-labels-section" style="border-top:1px solid var(--line-soft);margin-top:18px;padding-top:18px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div class="c-title" style="margin-bottom:0">Labels</div>
          <button class="btn btn-ghost btn-xs" id="d-labels-toggle" onclick="toggleLabelPicker()">Edit</button>
        </div>
        <div id="d-labels-display"></div>
        <div id="d-labels-picker" style="display:none;margin-top:10px"></div>
      </div>

      <!-- Checklist section (Session 3) -->
      <div class="checklist-section" id="d-checklist-section">
        <div class="checklist-head">
          <div class="checklist-title">Checklist</div>
        </div>
        <div id="d-checklist-progress"></div>
        <div class="checklist-items" id="d-checklist-items"></div>
        <div id="d-checklist-add"></div>
      </div>

      <!-- Activity log section (Session 5) -->
      <div class="activity-section" id="d-activity-section">
        <div class="activity-head">
          <div class="c-title" style="margin-bottom:0">Activity</div>
          <button class="btn btn-ghost btn-xs" id="d-activity-toggle" onclick="toggleActivityList()">Show all</button>
        </div>
        <div class="activity-list" id="d-activity-list"></div>
      </div>

      <div class="comments-wrap">
        <div class="c-title">Comments</div>
        <div class="c-list" id="c-list"></div>
        <div class="c-input-row">
          <div class="ava" id="c-ava" style="flex-shrink:0;margin-bottom:2px"></div>
          <textarea class="cinput" id="cinput" maxlength="2000" placeholder="Add a comment... (use @ to mention someone)" rows="1"></textarea>
          <button class="btn btn-acc btn-sm" onclick="addComment()" style="flex-shrink:0">Post</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add Person -->
<div class="overlay" id="m-person">
  <div class="modal">

function relativeTime(iso){
  if(!iso)return '';
  const d=new Date(iso);
  if(isNaN(d))return '';
  const sec=Math.round((Date.now()-d.getTime())/1000);
  if(sec<60)return 'just now';
  const min=Math.round(sec/60);
  if(min<60)return min+'m ago';
  const hr=Math.round(min/60);
  if(hr<24)return hr+'h ago';
  const day=Math.round(hr/24);
  if(day<7)return day+'d ago';
  if(day<30)return Math.round(day/7)+'w ago';
  return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
}
function fullTime(iso){
  if(!iso)return '';
  const d=new Date(iso);
  if(isNaN(d))return '';
  return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

/* ============================================================
   SECURITY — XSS escape helper (NEW — Session 1)
   Use esc() on every user-supplied string before innerHTML.
   ============================================================ */
function esc(s){
  if(s==null)return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function ga(name){const i=(name||'?').split(' ').map(n=>n[0]||'').join('').toUpperCase().slice(0,2);return{i,c:AVC[i.charCodeAt(0)%AVC.length]};}

/* ============================================================
   AUTH state handling
   ============================================================
   Supabase fires onAuthStateChange for many events, not just login/logout:
   - INITIAL_SESSION  → fired once on page load
   - SIGNED_IN        → user just logged in
   - SIGNED_OUT       → user just logged out
   - TOKEN_REFRESHED  → access token refreshed (every ~hour, AND on tab focus)
   - USER_UPDATED     → user metadata changed
   We only want to (re)boot the app on the events that mean "auth state actually
   changed". Otherwise tab-focus / token refresh would re-run boot() and could
   bounce the user back to login if any background fetch glitched.
   ============================================================ */
let SUPPRESS_AUTH_EVENTS=false;  /* Set true during admin signup flow */
let CURRENT_BOOTED_USER_ID=null; /* Tracks which user the app is currently booted for */

sb.auth.onAuthStateChange(async(ev,sess)=>{
  /* During savePerson we briefly create a new auth session and then restore
     the original CEO session. Don't react to those intermediate events. */
  if(SUPPRESS_AUTH_EVENTS)return;

  /* Real sign-out, or session disappeared after we'd booted the app */
  if(ev==='SIGNED_OUT'||(!sess&&CURRENT_BOOTED_USER_ID)){
    CURRENT_BOOTED_USER_ID=null;
    ME=null;
    showAuth();
    return;
  }
  /* If we don't have a session at all and we weren't booted, just stay on auth screen */
  if(!sess)return;

  /* Boot only when:
     - We haven't booted yet (CURRENT_BOOTED_USER_ID is null), OR
     - The session belongs to a different user than the one we booted for
       (rare, but happens if savePerson's session restore goes sideways)
     Token refreshes for the same user keep CURRENT_BOOTED_USER_ID === sess.user.id
     and do nothing — no re-boot, no UI flicker. */
  if(CURRENT_BOOTED_USER_ID===sess.user.id)return;

  await boot(sess.user);
});

/* Detect transient errors worth retrying — primarily Supabase's auth-token lock
   conflicts ("lock:sb-...auth-token was released because another request stole it")
   and similar JWT/session race conditions that resolve once the conflicting tab
   finishes its refresh. Real "wrong credentials" or "row not found" errors should
   NOT be retried. */
function isTransientAuthError(err){
  if(!err)return false;
  const msg=(err.message||err.toString()||'').toLowerCase();
  return msg.includes('lock:sb-')
      || msg.includes('was released because another request stole it')
      || msg.includes('navigator lock')
      || msg.includes('jwt expired')
      || msg.includes('session_not_found');
}

async function fetchMyProfile(userId){
  /* Try up to 3 times with exponential backoff for transient auth/lock errors */
  let lastErr=null;
  for(let attempt=0;attempt<3;attempt++){
    try{
      const{data,error}=await sb.from('profiles').select('*').eq('id',userId).single();
      if(error){
        lastErr=error;
        if(!isTransientAuthError(error))break;  /* don't retry real errors */
      }else if(data){
        return{data,error:null};
      }
    }catch(e){
      lastErr=e;
      if(!isTransientAuthError(e))break;
    }
    /* Wait 250ms, 600ms before next attempt — gives the conflicting tab time to settle */
    await new Promise(r=>setTimeout(r,250+attempt*350));
  }
  return{data:null,error:lastErr};
}

async function boot(user){
  try{
    const{data:p,error}=await fetchMyProfile(user.id);
    if(error||!p){
      const msg=error?.message||'unknown';
      /* If even after retries we still hit a transient auth lock issue, don't
         throw the user to a login screen — that just makes them re-enter
         credentials only to land in the same race. Show a softer toast and
         try once more after a longer wait. */
      if(isTransientAuthError(error)){
        showToast('Reconnecting…','err');
        await new Promise(r=>setTimeout(r,1000));
        const{data:p2}=await fetchMyProfile(user.id);
        if(p2){
          ME=p2;
          await loadAll();
          buildTopbar();
          document.getElementById('auth-screen').style.display='none';
          document.getElementById('app').style.display='block';
          gotoDefault();
          CURRENT_BOOTED_USER_ID=user.id;
          return;
        }
        /* Still failing — leave them on login with a clearer message */
        showToast('Could not connect. Try refreshing the page.','err');
        CURRENT_BOOTED_USER_ID=null;
        showAuth();
        return;
      }
      showToast('Profile not found: '+msg,'err');
      CURRENT_BOOTED_USER_ID=null;
      showAuth();
      return;
    }
    ME=p;
    /* Load tasks/profiles/etc. If this fails, we still want to show the app —
       loadAll() catches its own errors internally per table. */
    await loadAll();
    buildTopbar();
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app').style.display='block';
    gotoDefault();
    CURRENT_BOOTED_USER_ID=user.id;
  }catch(e){
    if(isTransientAuthError(e)){
      showToast('Connection issue. Try refreshing.','err');
    }else{
      showToast('Login error: '+e.message,'err');
    }
    CURRENT_BOOTED_USER_ID=null;
    showAuth();
  }
}

async function logActivity(taskId,action,fromVal,toVal){

    await sb.from('activity').insert({

      action,

}

/* Diff old and new task, log everything that changed */
async function logTaskDiff(taskId,oldT,newT){
  if(!oldT||!newT)return;
  const fields=[
    {key:'status',action:'status'},
    {key:'priority',action:'priority'},
    {key:'assignee_id',action:'assignee'},
    {key:'due_date',action:'due_date'}
  ];
  for(const f of fields){
    if((oldT[f.key]||null)!==(newT[f.key]||null)){
      await logActivity(taskId,f.action,oldT[f.key],newT[f.key]);
    }
  }
  /* Title change */
  if((oldT.title||'')!==(newT.title||'')){
    await logActivity(taskId,'title',oldT.title,newT.title);
  }
  /* Description change — log just that it changed, not the new content (could be huge) */
  if((oldT.description||'')!==(newT.description||'')){
    await logActivity(taskId,'description',null,null);
  }
}

async function doLogin(){
  const email=document.getElementById('inp-email').value.trim();
  const pass=document.getElementById('inp-pass').value;
  const btn=document.getElementById('login-btn');
  const err=document.getElementById('auth-err');
  err.style.display='none';
  if(!email||!pass){err.textContent='Enter email and password';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='Signing in...';

  /* No artificial timeout — Supabase has its own. The previous version raced
     a 10-second timer against the actual sign-in, which caused false errors
     to display even when the login eventually succeeded. */
  try{
    const{error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){
      err.textContent=error.message;
      err.style.display='block';
    }
    /* On success, do NOT manually transition the UI here. The
       onAuthStateChange handler with SIGNED_IN will run boot() exactly once
       and switch to the app. */
  }catch(e){
    err.textContent=e.message||'Could not sign in. Please try again.';
    err.style.display='block';
  }finally{
    btn.disabled=false;btn.textContent='Sign In';
  }
}

function renderPersonBoard(person,tasks,canAdd){

  const sortByPos=(a,b)=>{

    const bp=typeof b.position==='number'?b.position:Number.POSITIVE_INFINITY;
    if(ap!==bp)return ap-bp;
    return new Date(b.created_at)-new Date(a.created_at);
  };
  const todo=tasks.filter(t=>t.status==='todo').sort(sortByPos);
  const inp=tasks.filter(t=>t.status==='in_progress').sort(sortByPos);

            <div class="k-title-row">
              <div class="k-dot" style="background:${col.color}"></div>
              <span class="k-title">${col.label}</span>
              <span class="k-count">${items.length}</span>
            </div>
            ${canAdd?`<button class="k-add" title="Add a card" onclick="showInlineComposer('${safeId}','${col.key}')">+</button>`:''}
          </div>
          <div class="k-cards" ondragover="onDragOver(event)" ondrop="onDrop(event,'${col.key}','${safeId}')" ondragleave="onDragLeave(event)" data-col="${col.key}" data-person="${safeId}">
            ${items.map(t=>tCardHTML(t,false)).join('')}

}

/* ============================================================
   INLINE CARD COMPOSER (NEW — Session 1)
   Click "+ Add a card" → inline textarea appears in column.
   Type title, hit Enter or "Add card" button → saved.
   Stays open with focus for rapid sequential adds.
   ============================================================ */
function showInlineComposer(personId,colKey){
  // Close any other open composer first
  document.querySelectorAll('.inline-composer').forEach(c=>c.remove());
  document.querySelectorAll('.add-card-btn').forEach(b=>b.style.display='');
  
  const slotId='cmp-'+personId+'-'+colKey;
  const slot=document.getElementById(slotId);
  if(!slot)return;
  const addBtn=document.getElementById('addbtn-'+personId+'-'+colKey);
  if(addBtn)addBtn.style.display='none';
  
  slot.style.display='';
  slot.innerHTML=`<div class="inline-composer">
    <textarea placeholder="Enter a title for this card..." maxlength="200"
      onkeydown="composerKeydown(event,'${personId}','${colKey}')"></textarea>
    <div class="inline-composer-actions">
      <button class="btn btn-acc btn-sm" onclick="commitInlineComposer('${personId}','${colKey}')">Add card</button>
      <button class="composer-cancel" title="Cancel" onclick="hideInlineComposer('${personId}','${colKey}')">&#x2715;</button>
    </div>
  </div>`;
  const ta=slot.querySelector('textarea');
  ta.focus();
}

function hideInlineComposer(personId,colKey){
  const slotId='cmp-'+personId+'-'+colKey;
  const slot=document.getElementById(slotId);
  if(slot){slot.innerHTML='';slot.style.display='none';}
  const addBtn=document.getElementById('addbtn-'+personId+'-'+colKey);
  if(addBtn)addBtn.style.display='';
}

function composerKeydown(e,personId,colKey){
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    commitInlineComposer(personId,colKey);
  }else if(e.key==='Escape'){
    hideInlineComposer(personId,colKey);
  }
}

async function commitInlineComposer(personId,colKey){
  const slotId='cmp-'+personId+'-'+colKey;
  const slot=document.getElementById(slotId);
  if(!slot)return;
  const ta=slot.querySelector('textarea');
  if(!ta)return;
  const title=ta.value.trim();
  if(!title){showToast('Enter a title','err');ta.focus();return;}
  
  // Disable composer while saving
  ta.disabled=true;

  /* Compute position: append to bottom of destination column */
  const colTasks=TASKS.filter(t=>t.assignee_id===personId&&t.status===colKey);
  const maxPos=colTasks.reduce((m,t)=>typeof t.position==='number'&&t.position>m?t.position:m,0);
  const newPos=maxPos+1024;

  const payload={
    title,
    description:null,
    assignee_id:personId,
    priority:'medium',
    status:colKey,
    due_date:null,
    position:newPos,
    created_by:ME.id
  };
  const{data,error}=await sb.from('tasks').insert(payload).select().single();
  if(error){
    showToast('Error: '+error.message,'err');
    ta.disabled=false;ta.focus();
    return;
  }
  
  // Optimistically add to local state and re-render
  if(data)TASKS=[{...data,_comment_count:0},...TASKS];
  renderBoard();
  showToast('Card added','ok');
  
  // Re-open the composer in the same column for rapid sequential adds
  showInlineComposer(personId,colKey);
}

function onDragEnd(e){
  e.target.classList.remove('dragging');

  document.querySelectorAll('.drop-indicator').forEach(d=>d.remove());

function onDragOver(e){
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');

  /* Compute where to show the drop indicator: between which two cards. */
  const container=e.currentTarget;
  const cards=[...container.querySelectorAll('.t-card:not(.dragging)')];
  const y=e.clientY;
  let insertBefore=null;
  for(const card of cards){
    const rect=card.getBoundingClientRect();
    if(y < rect.top + rect.height/2){insertBefore=card;break;}
  }
  /* Remove old indicators, place a new one */
  container.querySelectorAll('.drop-indicator').forEach(d=>d.remove());
  const indicator=document.createElement('div');
  indicator.className='drop-indicator';
  if(insertBefore)container.insertBefore(indicator,insertBefore);
  else{
    /* Insert before the composer slot / add-card-btn footer */
    const composer=container.querySelector('[id^="cmp-"]');
    const addBtn=container.querySelector('.add-card-btn');
    const beforeMe=composer&&composer.style.display!=='none'?composer:addBtn;
    if(beforeMe)container.insertBefore(indicator,beforeMe);
    else container.appendChild(indicator);
  }
}
function onDragLeave(e){
  /* Only clear if we're truly leaving the container, not entering a child */
  if(e.currentTarget.contains(e.relatedTarget))return;
  e.currentTarget.classList.remove('drag-over');
  e.currentTarget.querySelectorAll('.drop-indicator').forEach(d=>d.remove());
}

/* Permission check: who can reassign across people? CEO + Manager. */
function canReassign(){
  return ME.role==='ceo'||ME.role==='manager';
}

/* Compute new position value for a task being inserted into a column.
   Returns a number: average of neighbours, or sensible bounds. */
function computeNewPosition(orderedTasks,insertIndex){
  /* orderedTasks: array of tasks already in destination column, sorted by position asc.
     insertIndex: 0..orderedTasks.length, where the dragged card should land. */
  const STEP=1024;
  const before=insertIndex>0?orderedTasks[insertIndex-1]:null;
  const after=insertIndex<orderedTasks.length?orderedTasks[insertIndex]:null;
  const beforePos=before&&typeof before.position==='number'?before.position:null;
  const afterPos=after&&typeof after.position==='number'?after.position:null;
  if(beforePos==null&&afterPos==null)return STEP;          /* empty col */
  if(beforePos==null)return afterPos-STEP;                 /* drop at top */
  if(afterPos==null)return beforePos+STEP;                 /* drop at bottom */
  return (beforePos+afterPos)/2;                           /* between two */
}

async function onDrop(e,ns,personId){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  e.currentTarget.querySelectorAll('.drop-indicator').forEach(d=>d.remove());
  if(!dragId)return;
  const t=TASKS.find(x=>x.id===dragId);
  if(!t){dragId=null;return;}

  /* Determine drop index inside the destination column from mouse Y position */
  const container=e.currentTarget;
  const cards=[...container.querySelectorAll('.t-card:not(.dragging)')];
  const y=e.clientY;
  let insertIndex=cards.length;
  for(let i=0;i<cards.length;i++){
    const rect=cards[i].getBoundingClientRect();
    if(y<rect.top+rect.height/2){insertIndex=i;break;}
  }

  /* Determine destination assignee. If dropping on a different swimlane,
     this is a reassignment — only allowed for CEO/manager. */
  const newAssignee=personId;
  const isReassign=newAssignee!==t.assignee_id;
  if(isReassign&&!canReassign()){
    showToast('Only managers and CEO can reassign tasks','err');
    dragId=null;return;
  }

  /* Build the destination column's task list (excluding the dragged one), sorted by position */
  const destTasks=TASKS
    .filter(x=>x.assignee_id===newAssignee&&x.status===ns&&x.id!==dragId)
    .sort((a,b)=>{
      const ap=typeof a.position==='number'?a.position:Number.POSITIVE_INFINITY;
      const bp=typeof b.position==='number'?b.position:Number.POSITIVE_INFINITY;
      if(ap!==bp)return ap-bp;
      return new Date(b.created_at)-new Date(a.created_at);
    });
  const newPos=computeNewPosition(destTasks,insertIndex);

  /* Skip update if absolutely nothing changed */
  if(!isReassign && t.status===ns && t.position===newPos){dragId=null;return;}

  dragMoved=true;

  /* Optimistic update */
  TASKS=TASKS.map(x=>x.id===dragId?{...x,status:ns,assignee_id:newAssignee,position:newPos,updated_at:new Date().toISOString()}:x);
  renderBoard();

  /* Persist */
  const payload={status:ns,assignee_id:newAssignee,position:newPos};
  const{error}=await sb.from('tasks').update(payload).eq('id',dragId);
  if(error){
    showToast('Error: '+error.message,'err');
    await loadAll();renderBoard();
  }else{
    /* Log activity for what changed */
    if(t.status!==ns)logActivity(dragId,'status',t.status,ns);
    if(isReassign)logActivity(dragId,'assignee',t.assignee_id,newAssignee);
    if(isReassign){
      const newPerson=PROFILES.find(p=>p.id===newAssignee);
      const colLabel=COLS.find(c=>c.key===ns).label;
      showToast('Moved to '+(newPerson?newPerson.full_name.split(' ')[0]:'?')+' — '+colLabel,'ok');
    }else if(t.status!==ns){
      showToast('Moved to '+COLS.find(c=>c.key===ns).label,'ok');
    }else{
      showToast('Reordered','ok');
    }
  }
  dragId=null;
}

function activityToText(a){
  const actor=PROFILES.find(p=>p.id===a.actor_id);

  const sl={todo:'To Do',in_progress:'In Progress',done:'Done'};
  switch(a.action){
    case 'created':
      return `<b>${esc(actorName)}</b> <span class="activity-action">created this task</span>`;
    case 'status':
      return `<b>${esc(actorName)}</b> <span class="activity-action">moved status</span> <b>${esc(sl[a.from_val]||a.from_val||'?')}</b> <span class="activity-action">→</span> <b>${esc(sl[a.to_val]||a.to_val||'?')}</b>`;
    case 'priority':
      return `<b>${esc(actorName)}</b> <span class="activity-action">changed priority to</span> <b>${esc(a.to_val||'?')}</b>`;
    case 'assignee': {
      const fromP=PROFILES.find(p=>p.id===a.from_val);
      const toP=PROFILES.find(p=>p.id===a.to_val);
      const fromName=fromP?fromP.full_name:(a.from_val?'Unknown':'Unassigned');
      const toName=toP?toP.full_name:(a.to_val?'Unknown':'Unassigned');
      return `<b>${esc(actorName)}</b> <span class="activity-action">reassigned</span> <b>${esc(fromName)}</b> <span class="activity-action">→</span> <b>${esc(toName)}</b>`;
    }
    case 'due_date':
      if(!a.from_val&&a.to_val)return `<b>${esc(actorName)}</b> <span class="activity-action">set due date to</span> <b>${esc(a.to_val)}</b>`;
      if(a.from_val&&!a.to_val)return `<b>${esc(actorName)}</b> <span class="activity-action">removed the due date</span>`;
      return `<b>${esc(actorName)}</b> <span class="activity-action">changed due date to</span> <b>${esc(a.to_val||'?')}</b>`;
    case 'title':
      return `<b>${esc(actorName)}</b> <span class="activity-action">renamed the task</span>`;
    case 'description':
      return `<b>${esc(actorName)}</b> <span class="activity-action">updated the description</span>`;
    case 'label_added': {
      const L=labelByKey(a.to_val);
      return `<b>${esc(actorName)}</b> <span class="activity-action">added label</span> <b>${esc(L?L.name:a.to_val||'?')}</b>`;
    }
    case 'label_removed': {
      const L=labelByKey(a.to_val);
      return `<b>${esc(actorName)}</b> <span class="activity-action">removed label</span> <b>${esc(L?L.name:a.to_val||'?')}</b>`;
    }
    case 'checklist_added':
      return `<b>${esc(actorName)}</b> <span class="activity-action">added checklist item</span> <b>${esc(a.to_val||'')}</b>`;
    case 'checklist_done':
      return `<b>${esc(actorName)}</b> <span class="activity-action">completed</span> <b>${esc(a.to_val||'')}</b>`;
    case 'checklist_undone':
      return `<b>${esc(actorName)}</b> <span class="activity-action">unchecked</span> <b>${esc(a.to_val||'')}</b>`;
    case 'checklist_deleted':
      return `<b>${esc(actorName)}</b> <span class="activity-action">removed checklist item</span> <b>${esc(a.to_val||'')}</b>`;
    default:
      return `<b>${esc(actorName)}</b> <span class="activity-action">${esc(a.action)}</span>`;
  }

/* Parse "Hey @Akash Saxena please review" into mentioned profile IDs.
   We match the longest possible name from the @ position. */
function parseMentions(text){
  if(!text)return [];
  const mentioned=new Set();
  /* Build a map of profile name → id, longest first to greedy-match */
  const sortedProfiles=[...PROFILES].sort((a,b)=>(b.full_name||'').length-(a.full_name||'').length);
  /* Walk through every @ in text */
  let i=0;
  while((i=text.indexOf('@',i))!==-1){
    const after=text.slice(i+1);
    let matched=null;
    for(const p of sortedProfiles){
      const name=p.full_name||'';
      if(!name)continue;
      if(after.toLowerCase().startsWith(name.toLowerCase())){
        /* boundary check: char after the name must be non-word or end */
        const nextCh=after.charAt(name.length);
        if(!nextCh||!/[\w]/.test(nextCh)){
          matched=p;
          break;
        }
      }
    }
    if(matched){
      mentioned.add(matched.id);
      i+=1+matched.full_name.length;
    }else{
      i+=1;
    }
  }
  return [...mentioned];
}

/* Render @Name patterns inside a comment as mention chips.
   We escape first, then replace @Name with chip HTML. Safe because
   we only recognize known profile names (no arbitrary HTML injection). */
function renderCommentBody(body){
  /* Escape entire body */
  let html=esc(body||'');
  /* Sort by name length desc so "Akash Saxena" matches before "Akash" */
  const sorted=[...PROFILES].sort((a,b)=>(b.full_name||'').length-(a.full_name||'').length);
  for(const p of sorted){
    if(!p.full_name)continue;
    /* Re-escape the name as it would appear in the escaped body */
    const escName=esc(p.full_name);
    /* Match @escName followed by non-word boundary (or end) */
    const re=new RegExp('@'+escName.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'(?=[^\\w]|$)','g');
    html=html.replace(re,'<span class="mention-chip">@'+escName+'</span>');
  }
  return html;
}

/* ── Autocomplete popup state ── */
let mentionAnchorPos=-1;       /* position of the @ in the textarea */
let mentionFiltered=[];        /* current filtered profile list */
let mentionSelectedIdx=0;
let mentionTextarea=null;       /* which textarea is active */

function closeMentionPopup(){
  const pop=document.getElementById('mention-popup');
  pop.classList.remove('open');
  mentionAnchorPos=-1;
  mentionFiltered=[];
  mentionTextarea=null;
}

function openMentionPopup(textarea,anchorPos,query){
  mentionTextarea=textarea;
  mentionAnchorPos=anchorPos;
  /* Filter profiles by query (case-insensitive substring of name) */
  const q=(query||'').toLowerCase();
  mentionFiltered=PROFILES
    .filter(p=>p.id!==ME.id)
    .filter(p=>!q||(p.full_name||'').toLowerCase().includes(q))
    .slice(0,8);
  if(!mentionFiltered.length){closeMentionPopup();return;}
  mentionSelectedIdx=0;
  /* Position popup just below the textarea */
  const rect=textarea.getBoundingClientRect();
  const pop=document.getElementById('mention-popup');
  pop.style.left=rect.left+'px';
  pop.style.top=(rect.bottom+window.scrollY+4)+'px';
  pop.classList.add('open');
  renderMentionPopup();
}

function renderMentionPopup(){
  const pop=document.getElementById('mention-popup');
  pop.innerHTML=mentionFiltered.map((p,idx)=>{
    const{i,c}=ga(p.full_name);
    return `<div class="mention-popup-row${idx===mentionSelectedIdx?' active':''}"
        onmouseover="mentionSelectedIdx=${idx};renderMentionPopup()"
        onclick="acceptMention(${idx})">
      <div class="ava" style="background:${c}">${esc(i)}</div>
      <div style="flex:1;min-width:0">
        <div class="mention-popup-name">${esc(p.full_name)}</div>
        <div class="mention-popup-role">${esc(p.role)}</div>
      </div>
    </div>`;
  }).join('');
}

function acceptMention(idx){
  if(!mentionTextarea||idx<0||idx>=mentionFiltered.length){closeMentionPopup();return;}
  const p=mentionFiltered[idx];
  const ta=mentionTextarea;
  const cursor=ta.selectionStart;
  const before=ta.value.slice(0,mentionAnchorPos);
  const after=ta.value.slice(cursor);
  const insertion='@'+p.full_name+' ';
  ta.value=before+insertion+after;
  const newCursor=before.length+insertion.length;
  ta.focus();
  ta.setSelectionRange(newCursor,newCursor);
  closeMentionPopup();
}

/* Wire input/keydown on the comment textarea (only on the comment textarea, not the task description) */
function handleCommentInput(e){
  const ta=e.target;
  const pos=ta.selectionStart;
  const upto=ta.value.slice(0,pos);
  /* Find last @ that isn't already part of a complete mention. Simplest: find last @ with
     no whitespace between it and cursor. */
  const lastAt=upto.lastIndexOf('@');
  if(lastAt===-1){closeMentionPopup();return;}
  const tail=upto.slice(lastAt+1);
  /* Bail if there's whitespace OR more than 30 chars (probably a stale @) */
  if(/\s/.test(tail)||tail.length>30){closeMentionPopup();return;}
  /* Bail if the char before @ is alphanumeric (probably an email like foo@bar) */
  const beforeAt=upto.charAt(lastAt-1);
  if(beforeAt&&/[\w]/.test(beforeAt)){closeMentionPopup();return;}
  openMentionPopup(ta,lastAt,tail);
}

function handleCommentKeydown(e){
  const popOpen=document.getElementById('mention-popup').classList.contains('open');
  if(popOpen){
    if(e.key==='ArrowDown'){e.preventDefault();mentionSelectedIdx=(mentionSelectedIdx+1)%mentionFiltered.length;renderMentionPopup();return;}
    if(e.key==='ArrowUp'){e.preventDefault();mentionSelectedIdx=(mentionSelectedIdx-1+mentionFiltered.length)%mentionFiltered.length;renderMentionPopup();return;}
    if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();acceptMention(mentionSelectedIdx);return;}
    if(e.key==='Escape'){e.preventDefault();closeMentionPopup();return;}
  }
  /* Original Enter-to-post behaviour, only when popup not open */
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addComment();}
}

async function toggleLabel(labelKey){
  if(!activeTaskId)return;
  const t=TASKS.find(x=>x.id===activeTaskId);if(!t)return;
  const canEdit=ME.role==='ceo'||ME.role==='manager'||t.assignee_id===ME.id;
  if(!canEdit){showToast('No permission to edit labels','err');return;}

  const cur=Array.isArray(t.labels)?t.labels.slice():[];
  const idx=cur.indexOf(labelKey);
  if(idx>=0)cur.splice(idx,1);else cur.push(labelKey);

  /* Optimistic local update */
  TASKS=TASKS.map(x=>x.id===activeTaskId?{...x,labels:cur,updated_at:new Date().toISOString()}:x);
  renderLabelsForTask({...t,labels:cur},canEdit);

  const{error}=await sb.from('tasks').update({labels:cur}).eq('id',activeTaskId);
  if(error){
    showToast('Error: '+error.message,'err');
    /* Revert on error */
    TASKS=TASKS.map(x=>x.id===activeTaskId?{...x,labels:t.labels}:x);
    renderLabelsForTask(t,canEdit);
    return;
  }
  /* Log activity: was this an add or remove? */
  const wasInOld=Array.isArray(t.labels)&&t.labels.includes(labelKey);
  await logActivity(activeTaskId,wasInOld?'label_removed':'label_added',null,labelKey);
  /* Refresh activity list if modal is open */
  loadActivityForTask(activeTaskId);
  /* Re-render the board so card-level labels update */
  if(document.getElementById('pg-board').classList.contains('active'))renderBoard();
}

/* ============================================================
   CHECKLIST — render and edit (Session 3)
   Permission: ONLY assignee or creator (per Session 3 decision)
   ============================================================ */
function canEditChecklist(t){
  if(!t)return false;
  return t.assignee_id===ME.id||t.created_by===ME.id;
}

function renderChecklistForTask(t){
  const items=Array.isArray(t.checklist)?t.checklist:[];
  const total=items.length;
  const done=items.filter(it=>it&&it.done).length;
  const allowEdit=canEditChecklist(t);

  /* Progress bar */
  const progEl=document.getElementById('d-checklist-progress');
  if(total>0){
    const pct=Math.round((done/total)*100);
    progEl.innerHTML=`<div class="checklist-progress-wrap">
      <span class="checklist-progress-num">${done}/${total}</span>
      <div class="checklist-progress-bar"><div class="checklist-progress-fill${done===total?' complete':''}" style="width:${pct}%"></div></div>
    </div>`;
  }else{
    progEl.innerHTML='';
  }

  /* Items */
  const itemsEl=document.getElementById('d-checklist-items');
  if(!total){
    itemsEl.innerHTML='<div style="font-size:13px;color:var(--muted-soft);padding:6px 8px">No items yet.</div>';
  }else{
    itemsEl.innerHTML=items.map((it,idx)=>{
      const safeText=esc(it&&it.text||'');
      const isDone=it&&it.done;
      const checkboxAttrs=allowEdit?`onchange="toggleChecklistItem(${idx})"`:'disabled';
      const textClick=allowEdit?`onclick="toggleChecklistItem(${idx})"`:'';
      return `<div class="checklist-item">
        <input type="checkbox" class="checklist-checkbox" ${isDone?'checked':''} ${checkboxAttrs}>
        <div class="checklist-text${isDone?' done':''}" ${textClick}>${safeText}</div>
        ${allowEdit?`<button class="checklist-delete" title="Delete item" onclick="deleteChecklistItem(${idx})">&#x2715;</button>`:''}
      </div>`;
    }).join('');
  }

  /* Add row */
  const addEl=document.getElementById('d-checklist-add');
  if(allowEdit){
    addEl.innerHTML=`<div class="checklist-add-row">
      <input type="text" class="checklist-add-input" id="checklist-new-text" maxlength="200" placeholder="Add an item..." onkeydown="checklistAddKeydown(event)">
      <button class="btn btn-acc btn-sm" onclick="addChecklistItem()">Add</button>
    </div>`;
  }else{
    addEl.innerHTML='<div class="checklist-readonly-note">Only the assignee or creator can edit this checklist.</div>';
  }
}

async function persistChecklist(newItems){
  if(!activeTaskId)return false;
  /* Optimistic */
  TASKS=TASKS.map(x=>x.id===activeTaskId?{...x,checklist:newItems,updated_at:new Date().toISOString()}:x);
  renderChecklistForTask(TASKS.find(x=>x.id===activeTaskId));
  const{error}=await sb.from('tasks').update({checklist:newItems}).eq('id',activeTaskId);
  if(error){
    showToast('Error: '+error.message,'err');
    /* Revert by re-loading on error */
    await loadAll();
    const fresh=TASKS.find(x=>x.id===activeTaskId);
    if(fresh)renderChecklistForTask(fresh);
    return false;
  }
  /* Re-render board so the badge updates */
  if(document.getElementById('pg-board').classList.contains('active'))renderBoard();
  return true;
}

async function addChecklistItem(){
  const inp=document.getElementById('checklist-new-text');
  if(!inp)return;
  const text=inp.value.trim();
  if(!text){inp.focus();return;}
  const t=TASKS.find(x=>x.id===activeTaskId);if(!t)return;
  if(!canEditChecklist(t)){showToast('No permission','err');return;}
  const cur=Array.isArray(t.checklist)?t.checklist.slice():[];
  cur.push({text,done:false});
  inp.value='';
  await persistChecklist(cur);
  await logActivity(activeTaskId,'checklist_added',null,text);
  loadActivityForTask(activeTaskId);
  /* Refocus input for rapid sequential adds */
  const newInp=document.getElementById('checklist-new-text');
  if(newInp)newInp.focus();
}

function checklistAddKeydown(e){
  if(e.key==='Enter'){e.preventDefault();addChecklistItem();}
}

async function toggleChecklistItem(idx){
  const t=TASKS.find(x=>x.id===activeTaskId);if(!t)return;
  if(!canEditChecklist(t)){showToast('No permission','err');return;}
  const cur=Array.isArray(t.checklist)?t.checklist.slice():[];
  if(idx<0||idx>=cur.length)return;
  const item=cur[idx];
  cur[idx]={...item,done:!item.done};
  await persistChecklist(cur);
  await logActivity(activeTaskId,cur[idx].done?'checklist_done':'checklist_undone',null,item.text);
  loadActivityForTask(activeTaskId);
}

async function deleteChecklistItem(idx){
  const t=TASKS.find(x=>x.id===activeTaskId);if(!t)return;
  if(!canEditChecklist(t)){showToast('No permission','err');return;}
  const cur=Array.isArray(t.checklist)?t.checklist.slice():[];
  if(idx<0||idx>=cur.length)return;
  const removed=cur[idx];
  cur.splice(idx,1);
  await persistChecklist(cur);
  await logActivity(activeTaskId,'checklist_deleted',null,removed.text);
  loadActivityForTask(activeTaskId);
}

async function addComment(){
  const inp=document.getElementById('cinput');
  const body=inp.value.trim();if(!body||!activeTaskId)return;
  const{data:inserted,error}=await sb.from('comments').insert({task_id:activeTaskId,author_id:ME.id,body}).select().single();
  if(error){showToast('Error posting comment','err');return;}
  inp.value='';
  closeMentionPopup();

  /* Parse @mentions and create mention + watcher rows (Session 5 / 5.5) */
  if(inserted){
    const ids=parseMentions(body).filter(uid=>uid!==ME.id);
    if(ids.length){
      const rows=ids.map(uid=>({comment_id:inserted.id,mentioned_user_id:uid}));
      try{await sb.from('mentions').insert(rows);}catch(e){/* ignore */}
      /* Grant the mentioned users view access to this task (Session 5.5).
         Upsert is safe — UNIQUE (task_id, user_id) prevents duplicates. */
      const watcherRows=ids.map(uid=>({task_id:activeTaskId,user_id:uid,added_by:ME.id}));
      try{await sb.from('task_watchers').upsert(watcherRows,{onConflict:'task_id,user_id'});}catch(e){/* ignore */}
    }
  }

  const{data:comments}=await sb.from('comments').select('*').eq('task_id',activeTaskId).order('created_at');
  renderComments(comments||[]);
  TASKS=TASKS.map(t=>t.id===activeTaskId?{...t,_comment_count:(t._comment_count||0)+1}:t);
  showToast('Comment posted','ok');
}

function renderOvList(){
  const q=(document.getElementById('ov-search').value||'').trim().toLowerCase();

  const prf=document.getElementById('ov-priority').value;

  if(q)tasks=tasks.filter(t=>(t.title||'').toLowerCase().includes(q));

    tasks=tasks.filter(t=>t.due_date&&new Date(t.due_date+'T00:00:00')<today&&t.status!=='done');
