<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkBoard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================================================
   WORKBOARD — Trello-faithful redesign
   Session 1 patches: XSS fix, topbar layout fix, inline card create
   ============================================================ */

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#ff6b35;
  --accent-dark:#e85d26;
  --ink:#172b4d;
  --ink-soft:#42526e;
  --muted:#5e6c84;
  --muted-soft:#8993a4;
  --line:#dfe1e6;
  --line-soft:#ebecf0;
  --bg-app:#f4f5f7;
  --bg-col:#ebecf0;
  --bg-card:#ffffff;
  --bg-card-hover:#fafbfc;
  --shadow-card:0 1px 0 rgba(9,30,66,.25);
  --shadow-card-hover:0 4px 8px -2px rgba(9,30,66,.25), 0 0 0 1px rgba(9,30,66,.08);
  --shadow-pop:0 8px 16px -4px rgba(9,30,66,.25), 0 0 1px rgba(9,30,66,.31);
  --shadow-modal:0 20px 32px -8px rgba(9,30,66,.25), 0 0 1px rgba(9,30,66,.31);
  --board-bg:linear-gradient(135deg,#0079bf 0%,#5067c5 50%,#7d51b3 100%);
  --label-green:#61bd4f;
  --label-yellow:#f2d600;
  --label-orange:#ff9f1a;
  --label-red:#eb5a46;
  --label-purple:#c377e0;
  --label-blue:#0079bf;
  --label-sky:#00c2e0;
  --label-lime:#51e898;
  --label-pink:#ff78cb;
  --label-black:#344563;
}

html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
  background:var(--bg-app);
  color:var(--ink);
  font-size:14px;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* ============================================================
   AUTH
   ============================================================ */
#auth-screen{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:var(--board-bg);
  position:relative;
  padding:20px;
}
#auth-screen::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 20% 30%,rgba(255,255,255,.12),transparent 50%),
             radial-gradient(circle at 80% 70%,rgba(255,255,255,.08),transparent 50%);
  pointer-events:none;
}
#app{display:none}

.auth-box{
  position:relative;
  background:#fff;
  border-radius:12px;
  padding:36px 40px 32px;
  width:400px;
  box-shadow:0 18px 40px -12px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.08);
}

.brand{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.brand-icon{
  width:38px;height:38px;
  background:linear-gradient(135deg,var(--accent),#ff8c5a);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:17px;color:#fff;
  box-shadow:0 2px 6px rgba(255,107,53,.4);
}
.brand-name{font-size:21px;font-weight:800;color:var(--ink);letter-spacing:-0.01em}

h2{font-size:22px;font-weight:700;color:var(--ink);margin-bottom:4px;letter-spacing:-0.01em}
.sub{color:var(--muted);font-size:13px;margin-bottom:24px}

.fg{margin-bottom:14px}
.fg label{
  display:block;
  font-size:11px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;
  color:var(--muted);margin-bottom:6px;
}
.fg input,.fg select,.fg textarea{
  width:100%;padding:10px 13px;
  background:#fafbfc;
  border:2px solid #fafbfc;
  border-radius:6px;
  font-family:inherit;font-size:14px;
  color:var(--ink);
  outline:none;
  transition:background .15s,border-color .15s;
}
.fg input:hover,.fg select:hover,.fg textarea:hover{background:#ebecf0;border-color:#ebecf0}
.fg input:focus,.fg select:focus,.fg textarea:focus{background:#fff;border-color:var(--accent)}
.fg textarea{resize:vertical;min-height:80px;line-height:1.5}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:8px 14px;
  border-radius:6px;border:none;
  font-family:inherit;font-size:13px;font-weight:600;
  cursor:pointer;
  transition:background .14s,box-shadow .14s,transform .05s;
  white-space:nowrap;
}
.btn:active{transform:translateY(1px)}
.btn-acc{background:var(--accent);color:#fff;box-shadow:0 1px 0 rgba(9,30,66,.15)}
.btn-acc:hover{background:var(--accent-dark)}
.btn-acc:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:rgba(9,30,66,.04);color:var(--ink-soft)}
.btn-ghost:hover{background:rgba(9,30,66,.08);color:var(--ink)}
.btn-red{background:#fef2f2;color:#bf2600;border:1px solid transparent}
.btn-red:hover{background:#ffebe6}
.btn-full{width:100%;padding:11px;font-size:14px;font-weight:700}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-xs{padding:4px 10px;font-size:11px;font-weight:700}

.auth-err{
  background:#ffebe6;border:1px solid #ffbdad;
  color:#bf2600;
  padding:10px 14px;border-radius:6px;
  font-size:13px;margin-top:14px;display:none;
}

/* ============================================================
   TOPBAR — fixed-position so content can flow under safely
   ============================================================ */
.topbar{
  background:rgba(0,0,0,.3);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  padding:0 20px;height:48px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:300;
  border-bottom:1px solid rgba(255,255,255,.08);
}
body.not-board .topbar{background:#1d2125;border-bottom-color:rgba(255,255,255,.06)}

.tb-left{display:flex;align-items:center;gap:18px}
.tb-brand{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800;color:#fff;letter-spacing:-0.01em}
.tb-icon{
  width:28px;height:28px;
  background:linear-gradient(135deg,var(--accent),#ff8c5a);
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:#fff;
}

.tb-nav{display:flex;gap:2px}
.nav-btn{
  padding:6px 12px;border-radius:4px;
  font-size:13px;font-weight:600;
  color:rgba(255,255,255,.7);cursor:pointer;
  border:none;background:transparent;
  font-family:inherit;
  transition:background .14s,color .14s;
}
.nav-btn:hover{color:#fff;background:rgba(255,255,255,.16)}
.nav-btn.active{color:#fff;background:rgba(255,255,255,.24)}

.tb-right{display:flex;align-items:center;gap:10px}
.user-chip{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.16);
  border-radius:20px;
  padding:3px 12px 3px 3px;
}
.ava{
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#fff;
  flex-shrink:0;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.15);
}
.ava-md{width:36px;height:36px;border-radius:50%;font-size:13px}
.uname{font-size:13px;font-weight:600;color:#fff}
.role-tag{
  font-size:9px;font-weight:800;
  letter-spacing:.08em;text-transform:uppercase;
  padding:2px 7px;border-radius:10px;
}
.rt-ceo{background:rgba(255,159,26,.25);color:#ffd494}
.rt-manager{background:rgba(97,189,79,.25);color:#a3e890}
.rt-member{background:rgba(255,255,255,.16);color:rgba(255,255,255,.85)}

.signout-btn{
  background:rgba(255,255,255,.08);
  border:none;
  color:rgba(255,255,255,.85);
  padding:6px 12px;border-radius:4px;
  font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;
  transition:background .14s;
}
.signout-btn:hover{background:rgba(255,255,255,.18);color:#fff}

/* ============================================================
   PAGES
   ============================================================ */
.page{display:none}
.page.active{display:block}

#pg-board{padding:0;background:var(--board-bg);min-height:calc(100vh - 48px)}
#pg-overview,#pg-people{padding:28px 32px}

/* FIX: board-head needs explicit top padding so titles aren't clipped
   when the sticky topbar overlaps on first render. */
.board-head{
  padding:24px 28px 16px;
  display:flex;align-items:flex-start;justify-content:space-between;gap:16px;
  flex-wrap:wrap;
}
.board-head .page-title{color:#fff;font-size:22px;font-weight:700;letter-spacing:-0.01em;text-shadow:0 1px 2px rgba(0,0,0,.2)}
.board-head .page-sub{color:rgba(255,255,255,.85);font-size:13px;margin-top:3px;text-shadow:0 1px 2px rgba(0,0,0,.15)}
.board-head .btn-ghost{background:rgba(255,255,255,.24);color:#fff}
.board-head .btn-ghost:hover{background:rgba(255,255,255,.32)}
.board-head .btn-ghost option{color:var(--ink)}
.board-head .btn-acc{box-shadow:0 1px 0 rgba(9,30,66,.25),0 2px 6px rgba(0,0,0,.15)}

.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:16px}
.page-title{font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-0.01em}
.page-sub{color:var(--muted);font-size:13px;margin-top:3px}

/* ============================================================
   KANBAN
   ============================================================ */
.kanban-wrap{padding:0 28px 28px;overflow-y:auto}

.person-lane{
  margin-bottom:22px;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  border-radius:12px;
  padding:16px 18px 18px;
  box-shadow:0 4px 12px rgba(0,0,0,.12),0 0 0 1px rgba(9,30,66,.08);
}
.person-head{
  display:flex;align-items:center;gap:12px;
  margin-bottom:14px;
  padding-bottom:12px;
  border-bottom:1px solid var(--line-soft);
}
.person-name{font-size:15px;font-weight:700;color:var(--ink);letter-spacing:-0.01em}
.person-meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.person-role-pill{
  font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.05em;
  padding:2px 8px;border-radius:10px;
}

.swimlane-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}

.k-col{
  background:var(--bg-col);
  border-radius:12px;
  display:flex;flex-direction:column;
  max-height:600px;
  overflow:hidden;
  box-shadow:0 1px 0 rgba(9,30,66,.12);
}
.k-head{
  padding:10px 14px 6px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  flex-shrink:0;
}
.k-title-row{display:flex;align-items:center;gap:8px;min-width:0}
.k-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 2px rgba(255,255,255,.6)}
.k-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft)}
.k-count{
  background:rgba(9,30,66,.08);
  border-radius:10px;
  padding:1px 8px;
  font-size:11px;font-weight:700;
  color:var(--muted);
}
.k-add{
  width:24px;height:24px;border-radius:4px;
  background:transparent;border:none;
  color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;line-height:1;
  transition:background .14s,color .14s;
}
.k-add:hover{background:rgba(9,30,66,.08);color:var(--ink)}

.k-cards{
  padding:4px 8px 8px;
  overflow-y:auto;flex:1;
  display:flex;flex-direction:column;gap:8px;
  min-height:80px;
  transition:background .15s;
}
.k-cards.drag-over{background:rgba(255,107,53,.15)}

/* Drop indicator: thin colored line between cards while dragging.
   Shows exactly where the dragged card will land. */
.drop-indicator{
  height:3px;
  background:var(--accent);
  border-radius:2px;
  margin:2px 4px;
  pointer-events:none;
  box-shadow:0 0 0 2px rgba(255,107,53,.2);
}

.empty-col{
  text-align:center;
  font-size:12px;color:var(--muted-soft);
  padding:14px 0;
  border:2px dashed rgba(9,30,66,.1);
  border-radius:8px;
  margin:4px 2px;
  font-weight:500;
}

.add-card-btn{
  display:flex;align-items:center;gap:6px;
  padding:8px 10px;
  background:transparent;border:none;
  color:var(--muted);
  font-family:inherit;font-size:13px;font-weight:500;
  cursor:pointer;border-radius:6px;
  text-align:left;
  margin:0 2px;
  transition:background .14s,color .14s;
  width:calc(100% - 4px);
}
.add-card-btn:hover{background:rgba(9,30,66,.08);color:var(--ink)}

/* ============================================================
   INLINE CARD COMPOSER (NEW — Session 1)
   ============================================================ */
.inline-composer{
  margin:0 2px;
  display:flex;flex-direction:column;gap:6px;
}
.inline-composer textarea{
  width:100%;
  padding:10px 12px;
  background:#fff;
  border:none;
  border-radius:8px;
  font-family:inherit;
  font-size:14px;
  color:var(--ink);
  resize:none;
  outline:none;
  box-shadow:0 1px 0 rgba(9,30,66,.25);
  min-height:60px;
  line-height:1.4;
}
.inline-composer textarea:focus{box-shadow:0 0 0 2px var(--accent)}
.inline-composer-actions{display:flex;align-items:center;gap:6px}
.composer-cancel{
  width:30px;height:30px;border-radius:6px;
  background:transparent;border:none;
  color:var(--muted);cursor:pointer;
  font-size:18px;line-height:1;
  display:flex;align-items:center;justify-content:center;
  transition:background .14s,color .14s;
}
.composer-cancel:hover{background:rgba(9,30,66,.08);color:var(--ink)}

/* ============================================================
   TASK CARD
   ============================================================ */
.t-card{
  background:var(--bg-card);
  border-radius:8px;
  padding:0;
  cursor:pointer;
  user-select:none;
  position:relative;
  box-shadow:var(--shadow-card);
  overflow:hidden;
  transition:background .12s,box-shadow .12s,transform .08s;
}
.t-card:hover{
  background:var(--bg-card-hover);
  box-shadow:var(--shadow-card-hover);
}
.t-card.dragging{opacity:.55;transform:rotate(3deg) scale(.98);box-shadow:var(--shadow-pop)}

.t-cover{height:8px;background:var(--label-blue)}
.t-card.pri-border-high .t-cover{background:linear-gradient(90deg,var(--label-red) 0%,#ff7452 100%)}
.t-card.pri-border-medium .t-cover{background:linear-gradient(90deg,var(--label-orange) 0%,#ffbf66 100%)}
.t-card.pri-border-low .t-cover{background:linear-gradient(90deg,var(--label-green) 0%,#8fd87a 100%)}

.t-body{padding:8px 12px 10px}

.t-labels{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.t-label{
  height:16px;
  min-width:40px;max-width:200px;
  border-radius:4px;
  flex-shrink:0;
  display:inline-flex;align-items:center;
  padding:0 8px;
  font-size:11px;font-weight:700;
  color:rgba(0,0,0,.78);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1;
}
/* Compact bars on board cards: hide the text, shrink height */
.t-card .t-label{
  height:8px;
  font-size:0;
  padding:0;
  min-width:40px;max-width:56px;
}
.t-label.l-green{background:var(--label-green)}
.t-label.l-yellow{background:var(--label-yellow)}
.t-label.l-orange{background:var(--label-orange)}
.t-label.l-red{background:var(--label-red)}
.t-label.l-purple{background:var(--label-purple)}
.t-label.l-blue{background:var(--label-blue)}

/* Label picker grid in detail modal */
.label-picker{display:flex;flex-direction:column;gap:6px}
.label-picker-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
  transition:background .14s;
  background:#fff;
  box-shadow:0 1px 2px rgba(9,30,66,.06);
}
.label-picker-row:hover{background:#fafbfc}
.label-picker-bar{
  flex:1;
  height:30px;border-radius:4px;
  display:flex;align-items:center;
  padding:0 12px;
  font-size:13px;font-weight:600;
  color:rgba(0,0,0,.78);
}
.label-picker-check{
  width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink);
  font-size:14px;font-weight:800;
}

.t-title-text{
  font-size:14px;font-weight:500;
  line-height:1.4;
  color:var(--ink);
  margin-bottom:8px;
  word-wrap:break-word;
  overflow-wrap:break-word;
}

.t-badges{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:6px}
.t-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:12px;font-weight:500;
  color:var(--muted);
  padding:2px 4px;
  border-radius:4px;
}
.t-badge svg{width:13px;height:13px;flex-shrink:0}
.t-badge.due-today{background:#fff3bf;color:#7a5c00}
.t-badge.due-late{background:#ffd2cc;color:#bf2600}
.t-badge.due-late svg{color:#bf2600}
.t-badge.checklist-complete{background:#d3f1a7;color:#2e6b1a}

/* ============================================================
   CHECKLIST in detail modal (Session 3)
   ============================================================ */
.checklist-section{
  border-top:1px solid var(--line-soft);
  margin-top:18px;padding-top:18px;
}
.checklist-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;gap:10px;
}
.checklist-title{
  font-size:12px;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;
  color:var(--muted);
}
.checklist-progress-wrap{
  display:flex;align-items:center;gap:10px;
  margin-bottom:12px;
}
.checklist-progress-num{
  font-size:11px;font-weight:700;color:var(--muted);
  min-width:30px;
}
.checklist-progress-bar{
  flex:1;height:8px;background:var(--line-soft);
  border-radius:4px;overflow:hidden;
}
.checklist-progress-fill{
  height:100%;background:var(--label-blue);
  transition:width .25s ease, background .25s ease;
}
.checklist-progress-fill.complete{background:var(--label-green)}

.checklist-items{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.checklist-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:6px 8px;
  border-radius:6px;
  transition:background .14s;
}
.checklist-item:hover{background:rgba(9,30,66,.04)}
.checklist-checkbox{
  width:18px;height:18px;
  flex-shrink:0;margin-top:1px;
  cursor:pointer;
  accent-color:var(--label-green);
}
.checklist-text{
  flex:1;font-size:13px;color:var(--ink);line-height:1.5;
  word-wrap:break-word;
  cursor:pointer;
}
.checklist-text.done{
  color:var(--muted-soft);
  text-decoration:line-through;
}
.checklist-delete{
  width:24px;height:24px;
  background:transparent;border:none;
  color:var(--muted-soft);cursor:pointer;
  font-size:14px;line-height:1;
  border-radius:4px;
  opacity:0;transition:opacity .14s,color .14s,background .14s;
}
.checklist-item:hover .checklist-delete{opacity:1}
.checklist-delete:hover{color:#bf2600;background:rgba(191,38,0,.1)}

.checklist-add-row{display:flex;gap:8px;align-items:center;margin-top:6px}
.checklist-add-input{
  flex:1;
  padding:8px 12px;
  background:#fff;
  border:2px solid #fff;
  border-radius:6px;
  font-family:inherit;font-size:13px;
  color:var(--ink);
  outline:none;
  box-shadow:0 1px 2px rgba(9,30,66,.06);
  transition:border-color .14s;
}
.checklist-add-input:focus{border-color:var(--accent)}

.checklist-readonly-note{
  font-size:11px;color:var(--muted-soft);
  margin-top:6px;font-style:italic;
}

.t-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:4px}
.pri{
  font-size:10px;font-weight:700;
  text-transform:uppercase;
  padding:2px 7px;border-radius:4px;
  letter-spacing:.04em;
}
.pri-high{background:#ffebe6;color:#bf2600}
.pri-medium{background:#fff7d6;color:#7a5c00}
.pri-low{background:#e3fcef;color:#006644}

.t-ass{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.t-ass .ava{width:24px;height:24px;font-size:9px;box-shadow:0 0 0 2px #fff}

.t-due{
  font-size:11px;color:var(--muted);
  background:var(--line-soft);
  padding:3px 8px;border-radius:4px;
  white-space:nowrap;font-weight:500;
}
.t-due.late{background:#ffd2cc;color:#bf2600}

/* ============================================================
   STATS, OVERVIEW, PEOPLE — unchanged
   ============================================================ */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
.stat{
  background:#fff;border-radius:10px;
  padding:18px 20px;
  border-top:3px solid var(--line);
  box-shadow:0 1px 2px rgba(9,30,66,.08),0 0 0 1px rgba(9,30,66,.04);
}
.stat-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.stat-val{font-size:28px;font-weight:800;color:var(--ink);letter-spacing:-0.02em}
.stat-sub{font-size:12px;color:var(--muted-soft);margin-top:3px}

.ov-panel{background:#fff;border-radius:10px;box-shadow:0 1px 2px rgba(9,30,66,.08),0 0 0 1px rgba(9,30,66,.04)}
.ov-panel-head{padding:14px 20px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;justify-content:space-between;gap:12px}
.ov-panel-head-title{font-size:14px;font-weight:700;color:var(--ink)}
.ov-panel-body{padding:6px 20px 16px}

.ov-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 0;
  border-bottom:1px solid var(--line-soft);
  cursor:pointer;
  transition:opacity .14s;
}
.ov-row:last-child{border-bottom:none}
.ov-row:hover{opacity:.7}

.ppl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.p-card{
  background:#fff;border-radius:10px;
  padding:18px 20px;
  display:flex;align-items:center;gap:14px;
  box-shadow:0 1px 2px rgba(9,30,66,.08),0 0 0 1px rgba(9,30,66,.04);
  transition:box-shadow .14s,transform .08s;
}
.p-card:hover{
  box-shadow:0 4px 12px rgba(9,30,66,.12),0 0 0 1px rgba(9,30,66,.08);
  transform:translateY(-1px);
}
.p-info{flex:1;min-width:0}
.p-name{font-size:15px;font-weight:700;color:var(--ink)}
.p-email{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.p-meta{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
.p-role{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 8px;border-radius:10px}
.pr-ceo{background:#fff7d6;color:#7a5c00}
.pr-manager{background:#e3fcef;color:#006644}
.pr-member{background:var(--line-soft);color:var(--muted)}
.p-actions{display:flex;gap:6px;flex-shrink:0}

/* ============================================================
   MODAL
   ============================================================ */
.overlay{
  position:fixed;inset:0;
  background:rgba(9,30,66,.54);
  z-index:500;
  display:none;align-items:flex-start;justify-content:center;
  padding:48px 20px 20px;
  overflow-y:auto;
}
.overlay.open{display:flex}

.modal{
  background:#f4f5f7;
  border-radius:10px;
  width:100%;max-width:520px;
  box-shadow:var(--shadow-modal);
  animation:mIn .18s ease;
  overflow:hidden;
}
.modal-wide{max-width:680px}

@keyframes mIn{
  from{opacity:0;transform:translateY(-8px) scale(.98)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

.m-head{
  padding:18px 20px 14px;
  background:#fff;
  border-bottom:1px solid var(--line-soft);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.m-title{font-size:16px;font-weight:700;color:var(--ink);min-width:0}
.m-close{
  width:30px;height:30px;border-radius:6px;
  background:transparent;border:none;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--muted);
  transition:background .14s,color .14s;
}
.m-close:hover{background:rgba(9,30,66,.08);color:var(--ink)}

.m-body{padding:20px;background:#f4f5f7}
.m-foot{
  padding:14px 20px;
  background:#fff;
  border-top:1px solid var(--line-soft);
  display:flex;gap:8px;justify-content:flex-end;
}

.m-body .fg input,.m-body .fg select,.m-body .fg textarea{background:#fff;border-color:#fff}
.m-body .fg input:hover,.m-body .fg select:hover,.m-body .fg textarea:hover{background:#fafbfc;border-color:#fafbfc}
.m-body .fg input:focus,.m-body .fg select:focus,.m-body .fg textarea:focus{background:#fff;border-color:var(--accent)}

/* ============================================================
   DETAIL MODAL
   ============================================================ */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
.dl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px}
.dv{font-size:14px;font-weight:600;color:var(--ink)}

#d-desc>div{
  background:#fff;
  border-radius:8px;
  padding:14px 16px;
  font-size:13px;color:var(--ink-soft);
  line-height:1.6;
  margin-bottom:8px;
  box-shadow:0 1px 2px rgba(9,30,66,.06);
  white-space:pre-wrap;
  word-wrap:break-word;
}

/* ============================================================
   COMMENTS
   ============================================================ */
.comments-wrap{border-top:1px solid var(--line-soft);margin-top:18px;padding-top:18px}
.c-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:14px}
.c-list{display:flex;flex-direction:column;gap:12px;margin-bottom:14px;max-height:240px;overflow-y:auto}
.c-item{display:flex;gap:10px}
.c-body{
  flex:1;
  background:#fff;
  border-radius:8px;
  padding:10px 14px;
  box-shadow:0 1px 2px rgba(9,30,66,.06);
}
.c-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.c-author{font-size:13px;font-weight:700;color:var(--ink)}
.c-time{font-size:11px;color:var(--muted-soft)}
.c-text{font-size:13px;color:var(--ink-soft);line-height:1.5;word-wrap:break-word;white-space:pre-wrap}

.c-input-row{display:flex;gap:8px;align-items:flex-end}
.cinput{
  flex:1;
  padding:10px 14px;
  background:#fff;
  border:2px solid #fff;
  border-radius:8px;
  font-family:inherit;font-size:13px;
  color:var(--ink);
  outline:none;resize:none;
  min-height:42px;max-height:120px;
  box-shadow:0 1px 2px rgba(9,30,66,.06);
  transition:border-color .14s;
}
.cinput:focus{border-color:var(--accent)}

/* ============================================================
   EMPTY / TOAST
   ============================================================ */
.empty{text-align:center;padding:48px 20px;color:var(--muted-soft)}
.empty h3{font-size:16px;font-weight:700;color:var(--muted);margin-bottom:6px}
.empty p{font-size:13px}

.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--ink);color:#fff;
  padding:11px 18px;border-radius:8px;
  font-size:13px;font-weight:600;
  box-shadow:0 8px 24px rgba(0,0,0,.25);
  z-index:9999;
  transform:translateY(60px);opacity:0;
  transition:transform .28s,opacity .28s;
}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:#006644}
.toast.err{background:#bf2600}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(9,30,66,.16);border-radius:4px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:rgba(9,30,66,.28);background-clip:padding-box;border:2px solid transparent}
#pg-board ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.32);background-clip:padding-box;border:2px solid transparent}
#pg-board ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.5);background-clip:padding-box;border:2px solid transparent}

.drag-handle{display:none}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div class="brand"><div class="brand-icon">W</div><span class="brand-name">WorkBoard</span></div>
    <h2>Welcome back</h2>
    <p class="sub">Sign in to your workspace</p>
    <div class="fg"><label>Email</label><input type="email" id="inp-email" placeholder="you@apporio.com"></div>
    <div class="fg"><label>Password</label><input type="password" id="inp-pass" placeholder="••••••••"></div>
    <button class="btn btn-acc btn-full" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<div id="toast"></div>

<div id="app">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-brand"><div class="tb-icon">W</div>WorkBoard</div>
      <nav class="tb-nav" id="tb-nav"></nav>
    </div>
    <div class="tb-right">
      <div class="user-chip"><div class="ava" id="top-ava"></div><span class="uname" id="top-name"></span><span class="role-tag" id="top-role"></span></div>
      <button class="signout-btn" onclick="doLogout()">Sign out</button>
    </div>
  </div>

  <div class="page" id="pg-board">
    <div class="board-head">
      <div><div class="page-title" id="board-title">My Board</div><div class="page-sub" id="board-sub">Your personal task board</div></div>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="board-filter" class="btn btn-ghost btn-sm" style="cursor:pointer" onchange="renderBoard()"><option value="mine">My Tasks</option></select>
        <button class="btn btn-acc btn-sm" onclick="openTaskModal()">+ Add Task</button>
      </div>
    </div>
    <div class="kanban-wrap" id="kanban-wrap"></div>
  </div>

  <div class="page" id="pg-overview">
    <div class="page-head">
      <div><div class="page-title">Org Overview</div><div class="page-sub">All tasks across the organisation</div></div>
      <button class="btn btn-acc btn-sm" onclick="openTaskModal()">+ New Task</button>
    </div>
    <div class="stats" id="stats"></div>
    <div class="ov-panel">
      <div class="ov-panel-head">
        <span class="ov-panel-head-title">All Tasks</span>
        <div style="display:flex;gap:8px">
          <select id="ov-person" class="btn btn-ghost btn-sm" style="cursor:pointer" onchange="renderOvList()"><option value="">Everyone</option></select>
          <select id="ov-status" class="btn btn-ghost btn-sm" style="cursor:pointer" onchange="renderOvList()"><option value="">All Status</option><option value="todo">To Do</option><option value="in_progress">In Progress</option><option value="done">Done</option></select>
        </div>
      </div>
      <div class="ov-panel-body" id="ov-list"></div>
    </div>
  </div>

  <div class="page" id="pg-people">
    <div class="page-head">
      <div><div class="page-title">People</div><div class="page-sub" id="ppl-sub"></div></div>
      <button class="btn btn-acc btn-sm" id="add-ppl-btn" onclick="openPersonModal()" style="display:none">+ Add Person</button>
    </div>
    <div class="ppl-grid" id="ppl-grid"></div>
  </div>
</div>

<!-- Task Modal -->
<div class="overlay" id="m-task">
  <div class="modal">
    <div class="m-head"><div class="m-title" id="m-task-title">New Task</div><button class="m-close" onclick="closeModal('m-task')">&#x2715;</button></div>
    <div class="m-body">
      <div class="fg"><label>Title</label><input type="text" id="t-title" maxlength="200" placeholder="What needs to be done?"></div>
      <div class="fg"><label>Description</label><textarea id="t-desc" maxlength="2000" placeholder="Add details..."></textarea></div>
      <div class="form-row">
        <div class="fg"><label>Assign To</label><select id="t-assignee"></select></div>
        <div class="fg"><label>Priority</label><select id="t-priority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select></div>
      </div>
      <div class="form-row">
        <div class="fg"><label>Status</label><select id="t-status"><option value="todo">To Do</option><option value="in_progress">In Progress</option><option value="done">Done</option></select></div>
        <div class="fg"><label>Due Date</label><input type="date" id="t-due"></div>
      </div>
    </div>
    <div class="m-foot"><button class="btn btn-ghost btn-sm" onclick="closeModal('m-task')">Cancel</button><button class="btn btn-acc btn-sm" onclick="saveTask()">Save Task</button></div>
  </div>
</div>

<!-- Detail Modal -->
<div class="overlay" id="m-detail">
  <div class="modal modal-wide">
    <div class="m-head">
      <div class="m-title" id="d-title" style="max-width:78%"></div>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn btn-sm btn-ghost" id="d-edit-btn" onclick="editFromDetail()">Edit</button>
        <button class="btn btn-sm btn-red" id="d-del-btn" onclick="deleteTask()">Delete</button>
        <button class="m-close" onclick="closeModal('m-detail')">&#x2715;</button>
      </div>
    </div>
    <div class="m-body">
      <div class="detail-grid" id="d-meta"></div>
      <div id="d-desc"></div>

      <!-- Labels section (Session 3) -->
      <div id="d-labels-section" style="border-top:1px solid var(--line-soft);margin-top:18px;padding-top:18px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div class="c-title" style="margin-bottom:0">Labels</div>
          <button class="btn btn-ghost btn-xs" id="d-labels-toggle" onclick="toggleLabelPicker()">Edit</button>
        </div>
        <div id="d-labels-display"></div>
        <div id="d-labels-picker" style="display:none;margin-top:10px"></div>

        <div class="checklist-items" id="d-checklist-items"></div>

      <div class="comments-wrap">
        <div class="c-title">Comments</div>
        <div class="c-list" id="c-list"></div>
        <div class="c-input-row">
          <div class="ava" id="c-ava" style="flex-shrink:0;margin-bottom:2px"></div>
          <textarea class="cinput" id="cinput" maxlength="2000" placeholder="Add a comment... (Enter to post)" rows="1"></textarea>
          <button class="btn btn-acc btn-sm" onclick="addComment()" style="flex-shrink:0">Post</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add Person -->
<div class="overlay" id="m-person">
  <div class="modal">
    <div class="m-head"><div class="m-title">Add Person</div><button class="m-close" onclick="closeModal('m-person')">&#x2715;</button></div>
    <div class="m-body">
      <div class="fg"><label>Full Name</label><input type="text" id="p-name" maxlength="100" placeholder="Rahul Sharma"></div>
      <div class="fg"><label>Email</label><input type="email" id="p-email" maxlength="200" placeholder="rahul@apporio.com"></div>
      <div class="fg"><label>Password</label><input type="password" id="p-pass" placeholder="Min 6 characters"></div>
      <div class="form-row">
        <div class="fg"><label>Role</label><select id="p-role"><option value="member">Member</option><option value="manager">Manager</option></select></div>
        <div class="fg"><label>Reports To</label><select id="p-mgr"><option value="">No manager</option></select></div>
      </div>
    </div>
    <div class="m-foot"><button class="btn btn-ghost btn-sm" onclick="closeModal('m-person')">Cancel</button><button class="btn btn-acc btn-sm" onclick="savePerson()">Create Account</button></div>
  </div>
</div>

<!-- Edit Person -->
<div class="overlay" id="m-edit-person">
  <div class="modal">
    <div class="m-head"><div class="m-title">Edit Person</div><button class="m-close" onclick="closeModal('m-edit-person')">&#x2715;</button></div>
    <div class="m-body">
      <div class="fg"><label>Full Name</label><input type="text" id="ep-name" maxlength="100"></div>
      <div class="form-row">
        <div class="fg"><label>Role</label><select id="ep-role"><option value="member">Member</option><option value="manager">Manager</option><option value="ceo">CEO</option></select></div>
        <div class="fg"><label>Reports To</label><select id="ep-mgr"><option value="">None</option></select></div>
      </div>
    </div>
    <div class="m-foot"><button class="btn btn-ghost btn-sm" onclick="closeModal('m-edit-person')">Cancel</button><button class="btn btn-acc btn-sm" onclick="updatePerson()">Save Changes</button></div>
  </div>
</div>

<script>
const SB_URL='https://uvrypfufkivylnrnxegi.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2cnlwZnVma2l2eWxucm54ZWdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzgxMDcsImV4cCI6MjA5Mjk1NDEwN30.y6PQm35mgNx8xXY-hd_pQ3oR8maQeAmiPqfAziyFaCo';
const sb=supabase.createClient(SB_URL,SB_KEY);

let ME=null,PROFILES=[],TASKS=[],activeTaskId=null,editingPersonId=null,dragId=null,dragMoved=false;
const COLS=[{key:'todo',label:'To Do',color:'#0079bf'},{key:'in_progress',label:'In Progress',color:'#ff9f1a'},{key:'done',label:'Done',color:'#61bd4f'}];
const AVC=['#0079bf','#ff6b35','#7c5ce0','#16a34a','#ca8a04','#0891b2','#c377e0','#eb5a46'];

/* ============================================================
   LABELS — fixed Trello-style set (Session 3)
   Stored on tasks.labels as a text[] of these key strings.
   ============================================================ */
const LABELS=[
  {key:'green',  name:'Done',      color:'#61bd4f'},
  {key:'yellow', name:'In Review', color:'#f2d600'},
  {key:'orange', name:'Blocked',   color:'#ff9f1a'},
  {key:'red',    name:'Urgent',    color:'#eb5a46'},
  {key:'purple', name:'Bug',       color:'#c377e0'},
  {key:'blue',   name:'Feature',   color:'#0079bf'}
];
function labelByKey(k){return LABELS.find(l=>l.key===k);}

/* ============================================================
   SECURITY — XSS escape helper (NEW — Session 1)
   Use esc() on every user-supplied string before innerHTML.
   ============================================================ */
function esc(s){
  if(s==null)return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function ga(name){const i=(name||'?').split(' ').map(n=>n[0]||'').join('').toUpperCase().slice(0,2);return{i,c:AVC[i.charCodeAt(0)%AVC.length]};}

sb.auth.onAuthStateChange(async(ev,sess)=>{
  if(sess){await boot(sess.user);}else{showAuth();}
});

async function boot(user){
  try{
    const timeout=new Promise((_,reject)=>setTimeout(()=>reject(new Error('timeout')),8000));
    const result=await Promise.race([
      sb.from('profiles').select('*').eq('id',user.id).single(),
      timeout
    ]);
    const{data:p,error}=result;
    if(error||!p){showToast('Profile not found: '+( error?.message||'unknown'),'err');showAuth();return;}
    ME=p;
    await Promise.race([loadAll(),new Promise(r=>setTimeout(r,5000))]);
    buildTopbar();
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app').style.display='block';
    gotoDefault();
  }catch(e){
    showToast('Login error: '+e.message,'err');
    showAuth();
  }
}
async function loadAll(){
  const[pr,tk]=await Promise.all([
    sb.from('profiles').select('*').order('full_name'),
    sb.from('tasks').select('*').order('position',{ascending:true,nullsFirst:false}).order('created_at',{ascending:false})
  ]);
  PROFILES=pr.data||[];TASKS=tk.data||[];
  try{
    const{data:comments}=await sb.from('comments').select('task_id');
    const counts={};
    (comments||[]).forEach(c=>{counts[c.task_id]=(counts[c.task_id]||0)+1;});
    TASKS=TASKS.map(t=>({...t,_comment_count:counts[t.id]||0}));
  }catch(e){/* ignore */}
}
async function doLogin(){
  const email=document.getElementById('inp-email').value.trim();
  const pass=document.getElementById('inp-pass').value;
  const btn=document.getElementById('login-btn');
  const err=document.getElementById('auth-err');
  err.style.display='none';
  if(!email||!pass){err.textContent='Enter email and password';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='Signing in...';
  
  const timeout=new Promise((_,reject)=>setTimeout(()=>reject(new Error('Connection timeout. Please try again.')),10000));
  
  try{
    const result=await Promise.race([
      sb.auth.signInWithPassword({email,password:pass}),
      timeout
    ]);
    if(result.error){
      err.textContent=result.error.message;err.style.display='block';
    }
  }catch(e){
    err.textContent=e.message;err.style.display='block';
  }finally{
    btn.disabled=false;btn.textContent='Sign In';
  }
}
document.getElementById('inp-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
async function doLogout(){await sb.auth.signOut();}
function showAuth(){document.getElementById('auth-screen').style.display='flex';document.getElementById('app').style.display='none';}

function buildTopbar(){
  const r=ME.role;
  let tabs='';
  if(r==='ceo')tabs='<button class="nav-btn" onclick="goto(\'board\',this)">My Board</button><button class="nav-btn" onclick="goto(\'overview\',this)">Org Overview</button><button class="nav-btn" onclick="goto(\'people\',this)">People</button>';
  else if(r==='manager')tabs='<button class="nav-btn" onclick="goto(\'board\',this)">My Board</button><button class="nav-btn" onclick="goto(\'people\',this)">My Team</button>';
  else tabs='<button class="nav-btn" onclick="goto(\'board\',this)">My Board</button>';
  document.getElementById('tb-nav').innerHTML=tabs;
  const name=ME.full_name||ME.email.split('@')[0];
  const{i,c}=ga(name);
  const a=document.getElementById('top-ava');a.textContent=i;a.style.background=c;
  document.getElementById('top-name').textContent=name;
  const rt=document.getElementById('top-role');rt.textContent=ME.role;rt.className='role-tag rt-'+ME.role;
}
function goto(page,btn){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-'+page).classList.add('active');
  if(page==='board')document.body.classList.remove('not-board');
  else document.body.classList.add('not-board');
  if(page==='board')renderBoard();
  if(page==='overview')renderOverview();

function renderPersonBoard(person,tasks,canAdd){
  const{i,c}=ga(person.full_name);
  /* Sort by position asc (nulls last), then created_at desc as tiebreaker.
     This is what the column drag-ordering reads/writes. */
  const sortByPos=(a,b)=>{
    const ap=typeof a.position==='number'?a.position:Number.POSITIVE_INFINITY;
    const bp=typeof b.position==='number'?b.position:Number.POSITIVE_INFINITY;
    if(ap!==bp)return ap-bp;
    return new Date(b.created_at)-new Date(a.created_at);
  };
  const todo=tasks.filter(t=>t.status==='todo').sort(sortByPos);
  const inp=tasks.filter(t=>t.status==='in_progress').sort(sortByPos);
  const done=tasks.filter(t=>t.status==='done').sort(sortByPos);
  const open=tasks.filter(t=>t.status!=='done').length;
  const roleClass={ceo:'pr-ceo',manager:'pr-manager',member:'pr-member'}[person.role]||'pr-member';
  const safeName=esc(person.full_name);
  const safeRole=esc(person.role);
  const safeId=esc(person.id);
  return `<div class="person-lane">
    <div class="person-head">
      <div class="ava ava-md" style="background:${c}">${esc(i)}</div>
      <div style="flex:1;min-width:0">
        <div class="person-name">${safeName}</div>
        <div class="person-meta">
          <span class="person-role-pill ${roleClass}">${safeRole}</span>
          <span>${open} open · ${tasks.length} total</span>
        </div>
      </div>
      ${canAdd?`<button class="btn btn-acc btn-xs" onclick="openTaskModal('${safeId}')">+ Task</button>`:''}
    </div>
    <div class="swimlane-cols">
      ${COLS.map(col=>{
        const items={todo,in_progress:inp,done}[col.key];
        const composerId='cmp-'+safeId+'-'+col.key;
        return `
        <div class="k-col">
          <div class="k-head">
            <div class="k-title-row">
              <div class="k-dot" style="background:${col.color}"></div>
              <span class="k-title">${col.label}</span>
              <span class="k-count">${items.length}</span>
            </div>
            ${canAdd?`<button class="k-add" title="Add a card" onclick="showInlineComposer('${safeId}','${col.key}')">+</button>`:''}
          </div>
          <div class="k-cards" ondragover="onDragOver(event)" ondrop="onDrop(event,'${col.key}','${safeId}')" ondragleave="onDragLeave(event)" data-col="${col.key}" data-person="${safeId}">
            ${items.map(t=>tCardHTML(t,false)).join('')}
            ${items.length===0?'<div class="empty-col">No tasks</div>':''}
            <div id="${composerId}" style="display:none"></div>
            ${canAdd?`<button class="add-card-btn" id="addbtn-${safeId}-${col.key}" onclick="showInlineComposer('${safeId}','${col.key}')">+ Add a card</button>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function tCardHTML(t,showA){
  const ass=PROFILES.find(p=>p.id===t.assignee_id);
  const{i,c}=ass?ga(ass.full_name):{i:'?',c:'#9ca3af'};
  const due=t.due_date?new Date(t.due_date+'T00:00:00'):null;
  const today=new Date();today.setHours(0,0,0,0);
  const isToday=due&&due.getTime()===today.getTime()&&t.status!=='done';
  const late=due&&due<today&&t.status!=='done';
  const dueStr=due?due.toLocaleDateString('en-IN',{day:'2-digit',month:'short'}):'';
  const canDrag=ME.role==='ceo'||ME.role==='manager'||t.assignee_id===ME.id;

  const labels=Array.isArray(t.labels)?t.labels:[];
  const commentCount=t._comment_count||0;
  const attachCount=t.attachment_count||0;
  let checklistTotal=0, checklistDone=0;
  if(Array.isArray(t.checklist)){
    checklistTotal=t.checklist.length;
    checklistDone=t.checklist.filter(it=>it&&it.done).length;
  }else if(typeof t.checklist_total==='number'){
    checklistTotal=t.checklist_total;
    checklistDone=t.checklist_done||0;
  }
  const checklistComplete=checklistTotal>0&&checklistDone===checklistTotal;

  const icoClock=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
  const icoChat=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
  const icoAttach=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>`;
  const icoCheck=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>`;

  const dueClass=late?' due-late':(isToday?' due-today':'');
  const hasBadges=dueStr||commentCount||attachCount||checklistTotal>0;

  /* SECURITY: every interpolated DB value is escaped before innerHTML */
  return `<div class="t-card pri-border-${esc(t.priority)}" id="tc-${esc(t.id)}"
    data-task-id="${esc(t.id)}"
    ${canDrag?'draggable="true"':''}

    ondragend="onDragEnd(event)"

      ${labels.length?`<div class="t-labels">${labels.map(l=>`<div class="t-label l-${esc(l)}"></div>`).join('')}</div>`:''}
      <div class="t-title-text">${esc(t.title)}</div>
      ${hasBadges?`<div class="t-badges">
        ${dueStr?`<div class="t-badge${dueClass}">${icoClock}<span>${esc(dueStr)}</span></div>`:''}
        ${commentCount?`<div class="t-badge">${icoChat}<span>${commentCount}</span></div>`:''}
        ${attachCount?`<div class="t-badge">${icoAttach}<span>${attachCount}</span></div>`:''}
        ${checklistTotal>0?`<div class="t-badge${checklistComplete?' checklist-complete':''}">${icoCheck}<span>${checklistDone}/${checklistTotal}</span></div>`:''}
      </div>`:''}
      <div class="t-footer">
        <div class="pri pri-${esc(t.priority)}">${esc(t.priority)}</div>
        ${ass?`<div class="t-ass" title="${esc(ass.full_name)}"><div class="ava" style="background:${c}">${esc(i)}</div></div>`:'<div></div>'}

}

/* ============================================================
   INLINE CARD COMPOSER (NEW — Session 1)
   Click "+ Add a card" → inline textarea appears in column.
   Type title, hit Enter or "Add card" button → saved.
   Stays open with focus for rapid sequential adds.
   ============================================================ */
function showInlineComposer(personId,colKey){
  // Close any other open composer first
  document.querySelectorAll('.inline-composer').forEach(c=>c.remove());
  document.querySelectorAll('.add-card-btn').forEach(b=>b.style.display='');
  
  const slotId='cmp-'+personId+'-'+colKey;
  const slot=document.getElementById(slotId);
  if(!slot)return;
  const addBtn=document.getElementById('addbtn-'+personId+'-'+colKey);
  if(addBtn)addBtn.style.display='none';
  
  slot.style.display='';
  slot.innerHTML=`<div class="inline-composer">
    <textarea placeholder="Enter a title for this card..." maxlength="200"
      onkeydown="composerKeydown(event,'${personId}','${colKey}')"></textarea>
    <div class="inline-composer-actions">
      <button class="btn btn-acc btn-sm" onclick="commitInlineComposer('${personId}','${colKey}')">Add card</button>
      <button class="composer-cancel" title="Cancel" onclick="hideInlineComposer('${personId}','${colKey}')">&#x2715;</button>
    </div>
  </div>`;
  const ta=slot.querySelector('textarea');
  ta.focus();
}

function hideInlineComposer(personId,colKey){
  const slotId='cmp-'+personId+'-'+colKey;
  const slot=document.getElementById(slotId);
  if(slot){slot.innerHTML='';slot.style.display='none';}
  const addBtn=document.getElementById('addbtn-'+personId+'-'+colKey);
  if(addBtn)addBtn.style.display='';
}

function composerKeydown(e,personId,colKey){
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    commitInlineComposer(personId,colKey);
  }else if(e.key==='Escape'){
    hideInlineComposer(personId,colKey);
  }
}

async function commitInlineComposer(personId,colKey){
  const slotId='cmp-'+personId+'-'+colKey;
  const slot=document.getElementById(slotId);
  if(!slot)return;
  const ta=slot.querySelector('textarea');
  if(!ta)return;
  const title=ta.value.trim();
  if(!title){showToast('Enter a title','err');ta.focus();return;}
  
  // Disable composer while saving
  ta.disabled=true;

  /* Compute position: append to bottom of destination column */
  const colTasks=TASKS.filter(t=>t.assignee_id===personId&&t.status===colKey);
  const maxPos=colTasks.reduce((m,t)=>typeof t.position==='number'&&t.position>m?t.position:m,0);
  const newPos=maxPos+1024;

  const payload={
    title,
    description:null,
    assignee_id:personId,
    priority:'medium',
    status:colKey,
    due_date:null,
    position:newPos,
    created_by:ME.id
  };
  const{data,error}=await sb.from('tasks').insert(payload).select().single();
  if(error){
    showToast('Error: '+error.message,'err');
    ta.disabled=false;ta.focus();
    return;
  }
  
  // Optimistically add to local state and re-render
  if(data)TASKS=[{...data,_comment_count:0},...TASKS];
  renderBoard();
  showToast('Card added','ok');
  
  // Re-open the composer in the same column for rapid sequential adds
  showInlineComposer(personId,colKey);
}

function makeDraggable(id){

  if(el)el.setAttribute('draggable','true');
}
function handleCardClick(e,id){

function onDragStart(e,id){
  dragId=id;dragMoved=false;
  const el=document.getElementById('tc-'+id);
  if(el)el.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',id);
}
function onDragEnd(e){
  e.target.classList.remove('dragging');
  document.querySelectorAll('.k-cards').forEach(c=>c.classList.remove('drag-over'));
  document.querySelectorAll('.drop-indicator').forEach(d=>d.remove());
  setTimeout(()=>{dragMoved=false;},50);
}
function onDragOver(e){
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');

  /* Compute where to show the drop indicator: between which two cards. */
  const container=e.currentTarget;
  const cards=[...container.querySelectorAll('.t-card:not(.dragging)')];
  const y=e.clientY;
  let insertBefore=null;
  for(const card of cards){
    const rect=card.getBoundingClientRect();
    if(y < rect.top + rect.height/2){insertBefore=card;break;}
  }
  /* Remove old indicators, place a new one */
  container.querySelectorAll('.drop-indicator').forEach(d=>d.remove());
  const indicator=document.createElement('div');
  indicator.className='drop-indicator';
  if(insertBefore)container.insertBefore(indicator,insertBefore);
  else{
    /* Insert before the composer slot / add-card-btn footer */
    const composer=container.querySelector('[id^="cmp-"]');
    const addBtn=container.querySelector('.add-card-btn');
    const beforeMe=composer&&composer.style.display!=='none'?composer:addBtn;
    if(beforeMe)container.insertBefore(indicator,beforeMe);
    else container.appendChild(indicator);
  }
}
function onDragLeave(e){
  /* Only clear if we're truly leaving the container, not entering a child */
  if(e.currentTarget.contains(e.relatedTarget))return;
  e.currentTarget.classList.remove('drag-over');
  e.currentTarget.querySelectorAll('.drop-indicator').forEach(d=>d.remove());
}

/* Permission check: who can reassign across people? CEO + Manager. */
function canReassign(){
  return ME.role==='ceo'||ME.role==='manager';
}

/* Compute new position value for a task being inserted into a column.
   Returns a number: average of neighbours, or sensible bounds. */
function computeNewPosition(orderedTasks,insertIndex){
  /* orderedTasks: array of tasks already in destination column, sorted by position asc.
     insertIndex: 0..orderedTasks.length, where the dragged card should land. */
  const STEP=1024;
  const before=insertIndex>0?orderedTasks[insertIndex-1]:null;
  const after=insertIndex<orderedTasks.length?orderedTasks[insertIndex]:null;
  const beforePos=before&&typeof before.position==='number'?before.position:null;
  const afterPos=after&&typeof after.position==='number'?after.position:null;
  if(beforePos==null&&afterPos==null)return STEP;          /* empty col */
  if(beforePos==null)return afterPos-STEP;                 /* drop at top */
  if(afterPos==null)return beforePos+STEP;                 /* drop at bottom */
  return (beforePos+afterPos)/2;                           /* between two */
}

async function onDrop(e,ns,personId){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  e.currentTarget.querySelectorAll('.drop-indicator').forEach(d=>d.remove());
  if(!dragId)return;
  const t=TASKS.find(x=>x.id===dragId);
  if(!t){dragId=null;return;}

  /* Determine drop index inside the destination column from mouse Y position */
  const container=e.currentTarget;
  const cards=[...container.querySelectorAll('.t-card:not(.dragging)')];
  const y=e.clientY;
  let insertIndex=cards.length;
  for(let i=0;i<cards.length;i++){
    const rect=cards[i].getBoundingClientRect();
    if(y<rect.top+rect.height/2){insertIndex=i;break;}
  }

  /* Determine destination assignee. If dropping on a different swimlane,
     this is a reassignment — only allowed for CEO/manager. */
  const newAssignee=personId;
  const isReassign=newAssignee!==t.assignee_id;
  if(isReassign&&!canReassign()){
    showToast('Only managers and CEO can reassign tasks','err');
    dragId=null;return;
  }

  /* Build the destination column's task list (excluding the dragged one), sorted by position */
  const destTasks=TASKS
    .filter(x=>x.assignee_id===newAssignee&&x.status===ns&&x.id!==dragId)
    .sort((a,b)=>{
      const ap=typeof a.position==='number'?a.position:Number.POSITIVE_INFINITY;
      const bp=typeof b.position==='number'?b.position:Number.POSITIVE_INFINITY;
      if(ap!==bp)return ap-bp;
      return new Date(b.created_at)-new Date(a.created_at);
    });
  const newPos=computeNewPosition(destTasks,insertIndex);

  /* Skip update if absolutely nothing changed */
  if(!isReassign && t.status===ns && t.position===newPos){dragId=null;return;}

  dragMoved=true;

  /* Optimistic update */
  TASKS=TASKS.map(x=>x.id===dragId?{...x,status:ns,assignee_id:newAssignee,position:newPos}:x);
  renderBoard();

  /* Persist */
  const payload={status:ns,assignee_id:newAssignee,position:newPos};
  const{error}=await sb.from('tasks').update(payload).eq('id',dragId);
  if(error){
    showToast('Error: '+error.message,'err');
    await loadAll();renderBoard();
  }else{
    if(isReassign){
      const newPerson=PROFILES.find(p=>p.id===newAssignee);
      const colLabel=COLS.find(c=>c.key===ns).label;
      showToast('Moved to '+(newPerson?newPerson.full_name.split(' ')[0]:'?')+' — '+colLabel,'ok');
    }else if(t.status!==ns){
      showToast('Moved to '+COLS.find(c=>c.key===ns).label,'ok');
    }else{
      showToast('Reordered','ok');
    }
  }
  dragId=null;
}

function renderLabelsForTask(t,canEdit){
  const labels=Array.isArray(t.labels)?t.labels:[];
  const display=document.getElementById('d-labels-display');
  const toggle=document.getElementById('d-labels-toggle');
  toggle.style.display=canEdit?'':'none';

  }else{
    display.innerHTML='<div class="t-labels" style="margin-bottom:0">'+
      labels.map(k=>{
        const L=labelByKey(k);if(!L)return '';
        return `<span class="t-label l-${esc(L.key)}">${esc(L.name)}</span>`;
      }).join('')+'</div>';
  }
  /* Build the picker (always built but hidden) */
  const picker=document.getElementById('d-labels-picker');
  picker.innerHTML='<div class="label-picker">'+
    LABELS.map(L=>{
      const active=labels.includes(L.key);
      return `<div class="label-picker-row" onclick="toggleLabel('${esc(L.key)}')">
        <div class="label-picker-bar l-${esc(L.key)}" style="background:${L.color}">${esc(L.name)}</div>
        <div class="label-picker-check">${active?'&#10003;':''}</div>
      </div>`;
    }).join('')+'</div>';
}

function toggleLabelPicker(){
  const picker=document.getElementById('d-labels-picker');
  const toggle=document.getElementById('d-labels-toggle');
  const showing=picker.style.display!=='none';
  picker.style.display=showing?'none':'';
  toggle.textContent=showing?'Edit':'Done';
}

async function toggleLabel(labelKey){
  if(!activeTaskId)return;
  const t=TASKS.find(x=>x.id===activeTaskId);if(!t)return;
  const canEdit=ME.role==='ceo'||ME.role==='manager'||t.assignee_id===ME.id;
  if(!canEdit){showToast('No permission to edit labels','err');return;}

  const cur=Array.isArray(t.labels)?t.labels.slice():[];
  const idx=cur.indexOf(labelKey);
  if(idx>=0)cur.splice(idx,1);else cur.push(labelKey);

  /* Optimistic local update */
  TASKS=TASKS.map(x=>x.id===activeTaskId?{...x,labels:cur}:x);
  renderLabelsForTask({...t,labels:cur},canEdit);

  const{error}=await sb.from('tasks').update({labels:cur}).eq('id',activeTaskId);
  if(error){
    showToast('Error: '+error.message,'err');
    /* Revert on error */
    TASKS=TASKS.map(x=>x.id===activeTaskId?{...x,labels:t.labels}:x);
    renderLabelsForTask(t,canEdit);
    return;
  }
  /* Re-render the board so card-level labels update */
  if(document.getElementById('pg-board').classList.contains('active'))renderBoard();
}

/* ============================================================
   CHECKLIST — render and edit (Session 3)
   Permission: ONLY assignee or creator (per Session 3 decision)
   ============================================================ */
function canEditChecklist(t){
  if(!t)return false;
  return t.assignee_id===ME.id||t.created_by===ME.id;
}

function renderChecklistForTask(t){
  const items=Array.isArray(t.checklist)?t.checklist:[];
  const total=items.length;
  const done=items.filter(it=>it&&it.done).length;
  const allowEdit=canEditChecklist(t);

  /* Progress bar */
  const progEl=document.getElementById('d-checklist-progress');
  if(total>0){
    const pct=Math.round((done/total)*100);
    progEl.innerHTML=`<div class="checklist-progress-wrap">
      <span class="checklist-progress-num">${done}/${total}</span>
      <div class="checklist-progress-bar"><div class="checklist-progress-fill${done===total?' complete':''}" style="width:${pct}%"></div></div>
    </div>`;
  }else{
    progEl.innerHTML='';
  }

  /* Items */
  const itemsEl=document.getElementById('d-checklist-items');
  if(!total){
    itemsEl.innerHTML='<div style="font-size:13px;color:var(--muted-soft);padding:6px 8px">No items yet.</div>';
  }else{
    itemsEl.innerHTML=items.map((it,idx)=>{
      const safeText=esc(it&&it.text||'');
      const isDone=it&&it.done;
      const checkboxAttrs=allowEdit?`onchange="toggleChecklistItem(${idx})"`:'disabled';
      const textClick=allowEdit?`onclick="toggleChecklistItem(${idx})"`:'';
      return `<div class="checklist-item">
        <input type="checkbox" class="checklist-checkbox" ${isDone?'checked':''} ${checkboxAttrs}>
        <div class="checklist-text${isDone?' done':''}" ${textClick}>${safeText}</div>
        ${allowEdit?`<button class="checklist-delete" title="Delete item" onclick="deleteChecklistItem(${idx})">&#x2715;</button>`:''}
      </div>`;
    }).join('');
  }

  /* Add row */
  const addEl=document.getElementById('d-checklist-add');
  if(allowEdit){
    addEl.innerHTML=`<div class="checklist-add-row">
      <input type="text" class="checklist-add-input" id="checklist-new-text" maxlength="200" placeholder="Add an item..." onkeydown="checklistAddKeydown(event)">
      <button class="btn btn-acc btn-sm" onclick="addChecklistItem()">Add</button>
    </div>`;
  }else{
    addEl.innerHTML='<div class="checklist-readonly-note">Only the assignee or creator can edit this checklist.</div>';
  }
}

async function persistChecklist(newItems){
  if(!activeTaskId)return false;
  /* Optimistic */
  TASKS=TASKS.map(x=>x.id===activeTaskId?{...x,checklist:newItems}:x);
  renderChecklistForTask(TASKS.find(x=>x.id===activeTaskId));
  const{error}=await sb.from('tasks').update({checklist:newItems}).eq('id',activeTaskId);
  if(error){
    showToast('Error: '+error.message,'err');
    /* Revert by re-loading on error */
    await loadAll();
    const fresh=TASKS.find(x=>x.id===activeTaskId);
    if(fresh)renderChecklistForTask(fresh);
    return false;
  }
  /* Re-render board so the badge updates */
  if(document.getElementById('pg-board').classList.contains('active'))renderBoard();
  return true;
}

async function addChecklistItem(){
  const inp=document.getElementById('checklist-new-text');
  if(!inp)return;
  const text=inp.value.trim();
  if(!text){inp.focus();return;}
  const t=TASKS.find(x=>x.id===activeTaskId);if(!t)return;
  if(!canEditChecklist(t)){showToast('No permission','err');return;}
  const cur=Array.isArray(t.checklist)?t.checklist.slice():[];
  cur.push({text,done:false});
  inp.value='';
  await persistChecklist(cur);
  /* Refocus input for rapid sequential adds */
  const newInp=document.getElementById('checklist-new-text');
  if(newInp)newInp.focus();
}

function checklistAddKeydown(e){
  if(e.key==='Enter'){e.preventDefault();addChecklistItem();}
}

async function toggleChecklistItem(idx){
  const t=TASKS.find(x=>x.id===activeTaskId);if(!t)return;
  if(!canEditChecklist(t)){showToast('No permission','err');return;}
  const cur=Array.isArray(t.checklist)?t.checklist.slice():[];
  if(idx<0||idx>=cur.length)return;
  cur[idx]={...cur[idx],done:!cur[idx].done};
  await persistChecklist(cur);
}

async function deleteChecklistItem(idx){
  const t=TASKS.find(x=>x.id===activeTaskId);if(!t)return;
  if(!canEditChecklist(t)){showToast('No permission','err');return;}
  const cur=Array.isArray(t.checklist)?t.checklist.slice():[];
  if(idx<0||idx>=cur.length)return;
  cur.splice(idx,1);
  await persistChecklist(cur);
}

function renderComments(comments){
  const el=document.getElementById('c-list');
  if(!comments.length){el.innerHTML='<div style="font-size:13px;color:var(--muted-soft);text-align:center;padding:16px 0">No comments yet. Be the first!</div>';return;}
  el.innerHTML=comments.map(c=>{
    const auth=PROFILES.find(p=>p.id===c.author_id);
    const{i,col}=auth?{i:ga(auth.full_name).i,col:ga(auth.full_name).c}:{i:'?',col:'#9ca3af'};
    const time=new Date(c.created_at).toLocaleDateString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    /* SECURITY: comment body and author name escaped */
    return `<div class="c-item"><div class="ava" style="background:${col};flex-shrink:0;width:32px;height:32px;font-size:11px">${esc(i)}</div><div class="c-body"><div class="c-meta"><span class="c-author">${auth?esc(auth.full_name):'Unknown'}</span><span class="c-time">${esc(time)}</span></div><div class="c-text">${esc(c.body)}</div></div></div>`;
  }).join('');
  el.scrollTop=el.scrollHeight;
}
async function addComment(){
  const inp=document.getElementById('cinput');
  const body=inp.value.trim();if(!body||!activeTaskId)return;
  const{error}=await sb.from('comments').insert({task_id:activeTaskId,author_id:ME.id,body});
  if(error){showToast('Error posting comment','err');return;}
  inp.value='';
  const{data:comments}=await sb.from('comments').select('*').eq('task_id',activeTaskId).order('created_at');
  renderComments(comments||[]);
  TASKS=TASKS.map(t=>t.id===activeTaskId?{...t,_comment_count:(t._comment_count||0)+1}:t);
  showToast('Comment posted','ok');
}
document.getElementById('cinput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addComment();}});

async function quickStatus(taskId,status){
  TASKS=TASKS.map(t=>t.id===taskId?{...t,status}:t);
  await sb.from('tasks').update({status}).eq('id',taskId);
  showToast('Status updated','ok');renderBoard();
}
function editFromDetail(){
  const t=TASKS.find(x=>x.id===activeTaskId);if(!t)return;
  closeModal('m-detail');
  activeTaskId=t.id;
  document.getElementById('m-task-title').textContent='Edit Task';
  document.getElementById('t-title').value=t.title;
  document.getElementById('t-desc').value=t.description||'';
  document.getElementById('t-priority').value=t.priority;
  document.getElementById('t-status').value=t.status;
  document.getElementById('t-due').value=t.due_date||'';
  let asgn=ME.role==='ceo'?PROFILES:[ME,...PROFILES.filter(p=>p.manager_id===ME.id)];
  document.getElementById('t-assignee').innerHTML='<option value="">Unassigned</option>'+asgn.map(p=>`<option value="${esc(p.id)}"${p.id===t.assignee_id?' selected':''}>${esc(p.full_name)} (${esc(p.role)})</option>`).join('');
  openModal('m-task');
}
async function deleteTask(){
  if(!activeTaskId||!confirm('Delete this task?'))return;
  const{error}=await sb.from('tasks').delete().eq('id',activeTaskId);
  if(error){showToast('Error deleting','err');return;}
  showToast('Task deleted','ok');closeModal('m-detail');await loadAll();renderBoard();
}

function renderOverview(){
  const todo=TASKS.filter(t=>t.status==='todo').length;
  const inp=TASKS.filter(t=>t.status==='in_progress').length;
  const done=TASKS.filter(t=>t.status==='done').length;
  document.getElementById('stats').innerHTML=`<div class="stat" style="border-top-color:#0079bf"><div class="stat-label">To Do</div><div class="stat-val">${todo}</div><div class="stat-sub">waiting</div></div><div class="stat" style="border-top-color:#ff9f1a"><div class="stat-label">In Progress</div><div class="stat-val">${inp}</div><div class="stat-sub">active</div></div><div class="stat" style="border-top-color:#61bd4f"><div class="stat-label">Done</div><div class="stat-val">${done}</div><div class="stat-sub">completed</div></div>`;
  document.getElementById('ov-person').innerHTML='<option value="">Everyone</option>'+PROFILES.map(p=>`<option value="${esc(p.id)}">${esc(p.full_name)}</option>`).join('');
  renderOvList();
}
function renderOvList(){
  const pf=document.getElementById('ov-person').value;
  const sf=document.getElementById('ov-status').value;
  let tasks=[...TASKS];
  if(pf)tasks=tasks.filter(t=>t.assignee_id===pf);
  if(sf)tasks=tasks.filter(t=>t.status===sf);
  const el=document.getElementById('ov-list');
  if(!tasks.length){el.innerHTML='<div class="empty"><h3>No tasks</h3><p>Adjust filters or add a task</p></div>';return;}
  const sc={todo:'#0079bf',in_progress:'#ff9f1a',done:'#61bd4f'};
  const sl={todo:'To Do',in_progress:'In Progress',done:'Done'};
  el.innerHTML=tasks.map(t=>{
    const ass=PROFILES.find(p=>p.id===t.assignee_id);
    const due=t.due_date?new Date(t.due_date+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short'}):'';
    const late=t.due_date&&new Date(t.due_date+'T00:00:00')<new Date()&&t.status!=='done';
    /* SECURITY: title and assignee name escaped */
    return `<div class="ov-row" onclick="openDetail('${esc(t.id)}')"><div style="width:8px;height:8px;border-radius:50%;background:${sc[t.status]};flex-shrink:0"></div><div style="flex:1;font-size:13px;font-weight:600;color:var(--ink)">${esc(t.title)}</div><div class="pri pri-${esc(t.priority)}">${esc(t.priority)}</div>${ass?`<div style="font-size:12px;color:var(--muted)">${esc(ass.full_name)}</div>`:''}${due?`<div class="t-due${late?' late':''}">${esc(due)}</div>`:''}<div style="font-size:12px;color:${sc[t.status]};font-weight:600;min-width:80px;text-align:right">${sl[t.status]}</div></div>`;
  }).join('');
}

function renderPeople(){
  const isCeo=ME.role==='ceo';
  const people=isCeo?PROFILES.filter(p=>p.id!==ME.id):PROFILES.filter(p=>p.manager_id===ME.id);
  document.getElementById('ppl-sub').textContent=isCeo?`${people.length} people in your workspace`:`${people.length} people report to you`;
  document.getElementById('add-ppl-btn').style.display=isCeo?'':'none';
  const el=document.getElementById('ppl-grid');
  if(!people.length){el.innerHTML='<div class="empty"><h3>No people yet</h3><p>Add your first team member</p></div>';return;}
  el.innerHTML=people.map(p=>{
    const{i,c}=ga(p.full_name);
    const mgr=PROFILES.find(m=>m.id===p.manager_id);
    const rc={ceo:'pr-ceo',manager:'pr-manager',member:'pr-member'}[p.role]||'pr-member';
    const open=TASKS.filter(t=>t.assignee_id===p.id&&t.status!=='done').length;
    /* SECURITY: name, email, manager name escaped */
    return `<div class="p-card"><div class="ava ava-md" style="background:${c}">${esc(i)}</div><div class="p-info"><div class="p-name">${esc(p.full_name)}</div><div class="p-email">${esc(p.email)}</div><div class="p-meta"><span class="p-role ${rc}">${esc(p.role)}</span>${mgr?`<span style="font-size:11px;color:var(--muted)">→ ${esc(mgr.full_name)}</span>`:''}<span style="font-size:11px;color:var(--muted)">${open} open</span></div></div><div class="p-actions">${isCeo?`<button class="btn btn-xs btn-ghost" onclick="openEditPerson('${esc(p.id)}')">Edit</button>`:''}<button class="btn btn-xs btn-acc" onclick="openTaskModal('${esc(p.id)}')">+ Task</button></div></div>`;
  }).join('');
}

function openPersonModal(){
  document.getElementById('p-name').value='';document.getElementById('p-email').value='';document.getElementById('p-pass').value='';document.getElementById('p-role').value='member';
  const mgrs=PROFILES.filter(p=>p.role==='manager'||p.role==='ceo');
  document.getElementById('p-mgr').innerHTML='<option value="">No manager</option>'+mgrs.map(p=>`<option value="${esc(p.id)}">${esc(p.full_name)} (${esc(p.role)})</option>`).join('');
  openModal('m-person');
}
async function savePerson(){
  const name=document.getElementById('p-name').value.trim();
  const email=document.getElementById('p-email').value.trim();
  const pass=document.getElementById('p-pass').value;
  const role=document.getElementById('p-role').value;
  const mgr=document.getElementById('p-mgr').value;
  if(!name||!email||!pass){showToast('Fill all fields','err');return;}
  if(pass.length<6){showToast('Password must be 6+ characters','err');return;}
  const{data:{session:cur}}=await sb.auth.getSession();
  const savedAccess=cur?.access_token;
  const savedRefresh=cur?.refresh_token;
  const savedMe=ME;
  const{data:su,error:se}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
  if(se){
    if(savedAccess&&savedRefresh)await sb.auth.setSession({access_token:savedAccess,refresh_token:savedRefresh});
    showToast('Error: '+se.message,'err');return;
  }
  const uid=su.user?.id;
  if(savedAccess&&savedRefresh){
    await sb.auth.setSession({access_token:savedAccess,refresh_token:savedRefresh});
    ME=savedMe;
  }
  if(uid)await sb.from('profiles').upsert({id:uid,full_name:name,email,role,manager_id:mgr||null});
  closeModal('m-person');
  showToast(name+' added!','ok');
  await loadAll();
  renderPeople();
}  
function openEditPerson(id){
  editingPersonId=id;const p=PROFILES.find(x=>x.id===id);if(!p)return;
  document.getElementById('ep-name').value=p.full_name;
  document.getElementById('ep-role').value=p.role;
  const others=PROFILES.filter(x=>x.id!==id&&(x.role==='manager'||x.role==='ceo'));
  document.getElementById('ep-mgr').innerHTML='<option value="">None</option>'+others.map(x=>`<option value="${esc(x.id)}"${x.id===p.manager_id?' selected':''}>${esc(x.full_name)} (${esc(x.role)})</option>`).join('');
  openModal('m-edit-person');
}
async function updatePerson(){
  const name=document.getElementById('ep-name').value.trim();
  const role=document.getElementById('ep-role').value;
  const mgr=document.getElementById('ep-mgr').value;
  if(!name){showToast('Enter a name','err');return;}
  const{error}=await sb.from('profiles').update({full_name:name,role,manager_id:mgr||null}).eq('id',editingPersonId);
  if(error){showToast('Error: '+error.message,'err');return;}
  closeModal('m-edit-person');showToast('Updated!','ok');await loadAll();renderPeople();
}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(o=>{o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');});});

/* Press Escape to close any open modal */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    document.querySelectorAll('.overlay.open').forEach(o=>o.classList.remove('open'));
  }
});

let toastT;
function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(type?' '+type:'');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3000);}
</script>
