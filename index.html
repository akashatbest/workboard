  /* Update result count badge */
  const countEl=document.getElementById('ov-count');
  countEl.textContent=anyActive?`(${tasks.length} of ${TASKS.length})`:`(${TASKS.length})`;

  const el=document.getElementById('ov-list');
  if(!tasks.length){el.innerHTML='<div class="empty"><h3>No tasks match</h3><p>Try clearing some filters</p></div>';return;}
  const sc={todo:'#0079bf',in_progress:'#ff9f1a',done:'#61bd4f'};
  const sl={todo:'To Do',in_progress:'In Progress',done:'Done'};
  el.innerHTML=tasks.map(t=>{
    const ass=PROFILES.find(p=>p.id===t.assignee_id);
    const due=t.due_date?new Date(t.due_date+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short'}):'';
    const late=t.due_date&&new Date(t.due_date+'T00:00:00')<new Date()&&t.status!=='done';
    /* Show first up-to-3 label dots inline */
    const labelDots=Array.isArray(t.labels)&&t.labels.length?
      `<div style="display:flex;gap:3px;flex-shrink:0">${t.labels.slice(0,3).map(k=>{const L=labelByKey(k);return L?`<div title="${esc(L.name)}" style="width:8px;height:14px;border-radius:3px;background:${L.color}"></div>`:'';}).join('')}</div>`:'';
    /* SECURITY: title and assignee name escaped */
    return `<div class="ov-row" onclick="openDetail('${esc(t.id)}')">
      <div style="width:8px;height:8px;border-radius:50%;background:${sc[t.status]};flex-shrink:0"></div>
      ${labelDots}
      <div style="flex:1;font-size:13px;font-weight:600;color:var(--ink);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.title)}</div>
      <div class="pri pri-${esc(t.priority)}">${esc(t.priority)}</div>
      ${ass?`<div style="font-size:12px;color:var(--muted);min-width:90px;text-align:right">${esc(ass.full_name)}</div>`:'<div style="min-width:90px"></div>'}
      ${due?`<div class="t-due${late?' late':''}">${esc(due)}</div>`:'<div style="min-width:60px"></div>'}
      <div style="font-size:11px;color:var(--muted-soft);min-width:80px;text-align:right" title="${esc(fullTime(t.updated_at||t.created_at))}">${esc(relativeTime(t.updated_at||t.created_at))}</div>
      <div style="font-size:12px;color:${sc[t.status]};font-weight:600;min-width:80px;text-align:right">${sl[t.status]}</div>
    </div>`;
  }).join('');
}

function renderPeople(){
  const isCeo=ME.role==='ceo';
  const people=isCeo?PROFILES.filter(p=>p.id!==ME.id):PROFILES.filter(p=>p.manager_id===ME.id);
  document.getElementById('ppl-sub').textContent=isCeo?`${people.length} people in your workspace`:`${people.length} people report to you`;
  document.getElementById('add-ppl-btn').style.display=isCeo?'':'none';
  const el=document.getElementById('ppl-grid');
  if(!people.length){el.innerHTML='<div class="empty"><h3>No people yet</h3><p>Add your first team member</p></div>';return;}
  el.innerHTML=people.map(p=>{
    const{i,c}=ga(p.full_name);
    const mgr=PROFILES.find(m=>m.id===p.manager_id);
    const rc={ceo:'pr-ceo',manager:'pr-manager',member:'pr-member'}[p.role]||'pr-member';
    const open=TASKS.filter(t=>t.assignee_id===p.id&&t.status!=='done').length;
    /* SECURITY: name, email, manager name escaped */
    return `<div class="p-card"><div class="ava ava-md" style="background:${c}">${esc(i)}</div><div class="p-info"><div class="p-name">${esc(p.full_name)}</div><div class="p-email">${esc(p.email)}</div><div class="p-meta"><span class="p-role ${rc}">${esc(p.role)}</span>${mgr?`<span style="font-size:11px;color:var(--muted)">→ ${esc(mgr.full_name)}</span>`:''}<span style="font-size:11px;color:var(--muted)">${open} open</span></div></div><div class="p-actions">${isCeo?`<button class="btn btn-xs btn-ghost" onclick="openEditPerson('${esc(p.id)}')">Edit</button>`:''}<button class="btn btn-xs btn-acc" onclick="openTaskModal('${esc(p.id)}')">+ Task</button></div></div>`;
  }).join('');
}

function openPersonModal(){
  document.getElementById('p-name').value='';document.getElementById('p-email').value='';document.getElementById('p-pass').value='';document.getElementById('p-role').value='member';
  const mgrs=PROFILES.filter(p=>p.role==='manager'||p.role==='ceo');
  document.getElementById('p-mgr').innerHTML='<option value="">No manager</option>'+mgrs.map(p=>`<option value="${esc(p.id)}">${esc(p.full_name)} (${esc(p.role)})</option>`).join('');
  openModal('m-person');
}
async function savePerson(){
  const name=document.getElementById('p-name').value.trim();
  const email=document.getElementById('p-email').value.trim();
  const pass=document.getElementById('p-pass').value;
  const role=document.getElementById('p-role').value;
  const mgr=document.getElementById('p-mgr').value;
  if(!name||!email||!pass){showToast('Fill all fields','err');return;}
  if(pass.length<6){showToast('Password must be 6+ characters','err');return;}
  const{data:{session:cur}}=await sb.auth.getSession();
  const savedAccess=cur?.access_token;
  const savedRefresh=cur?.refresh_token;
  const savedMe=ME;
  /* Suppress auth events while we briefly switch sessions to create the new user */
  SUPPRESS_AUTH_EVENTS=true;
  try{
    const{data:su,error:se}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
    if(se){
      if(savedAccess&&savedRefresh)await sb.auth.setSession({access_token:savedAccess,refresh_token:savedRefresh});
      showToast('Error: '+se.message,'err');return;
    }
    const uid=su.user?.id;
    if(savedAccess&&savedRefresh){
      await sb.auth.setSession({access_token:savedAccess,refresh_token:savedRefresh});
      ME=savedMe;
    }
    if(uid)await sb.from('profiles').upsert({id:uid,full_name:name,email,role,manager_id:mgr||null});
    closeModal('m-person');
    showToast(name+' added!','ok');
    await loadAll();
    renderPeople();
  }finally{
    SUPPRESS_AUTH_EVENTS=false;
  }
}  
function openEditPerson(id){
  editingPersonId=id;const p=PROFILES.find(x=>x.id===id);if(!p)return;
  document.getElementById('ep-name').value=p.full_name;
  document.getElementById('ep-role').value=p.role;
  const others=PROFILES.filter(x=>x.id!==id&&(x.role==='manager'||x.role==='ceo'));
  document.getElementById('ep-mgr').innerHTML='<option value="">None</option>'+others.map(x=>`<option value="${esc(x.id)}"${x.id===p.manager_id?' selected':''}>${esc(x.full_name)} (${esc(x.role)})</option>`).join('');
  openModal('m-edit-person');
}
async function updatePerson(){
  const name=document.getElementById('ep-name').value.trim();
  const role=document.getElementById('ep-role').value;
  const mgr=document.getElementById('ep-mgr').value;
  if(!name){showToast('Enter a name','err');return;}
  const{error}=await sb.from('profiles').update({full_name:name,role,manager_id:mgr||null}).eq('id',editingPersonId);
  if(error){showToast('Error: '+error.message,'err');return;}
  closeModal('m-edit-person');showToast('Updated!','ok');await loadAll();renderPeople();
}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(o=>{o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');});});

/* Press Escape to close any open modal */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    document.querySelectorAll('.overlay.open').forEach(o=>o.classList.remove('open'));
  }
});

let toastT;
function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(type?' '+type:'');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3000);}
</script>
